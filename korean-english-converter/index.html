<script>
// 한영 키보드 매핑
const ENG_KEYS = "rRseEfaqQtTdwWczxvgkoiOjpuPhynbml";
const KOR_CHO  = "ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ";
const KOR_JUNG = "ㅏㅐㅑㅒㅓㅔㅕㅖㅗㅘㅙㅚㅛㅜㅝㅞㅟㅠㅡㅢㅣ";
const KOR_JONG = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

// 영문 키 → 한글 자모 매핑
const engToJamo = {
  'r':'ㄱ','R':'ㄲ','s':'ㄴ','e':'ㄷ','E':'ㄸ','f':'ㄹ','a':'ㅁ','q':'ㅂ','Q':'ㅃ',
  't':'ㅅ','T':'ㅆ','d':'ㅇ','w':'ㅈ','W':'ㅉ','c':'ㅊ','z':'ㅋ','x':'ㅌ','v':'ㅍ','g':'ㅎ',
  'k':'ㅏ','o':'ㅐ','i':'ㅑ','O':'ㅒ','j':'ㅓ','p':'ㅔ','u':'ㅕ','P':'ㅖ',
  'h':'ㅗ','y':'ㅛ','n':'ㅜ','b':'ㅠ','m':'ㅡ','l':'ㅣ',
  'hk':'ㅘ','ho':'ㅙ','hl':'ㅚ','nj':'ㅝ','np':'ㅞ','nl':'ㅟ','ml':'ㅢ'
};

// 한글 자모 → 영문 키 매핑
const jamoToEng = {};
for(const [e,k] of Object.entries(engToJamo)) jamoToEng[k] = e;

// 초성 인덱스 매핑
const CHO_MAP = {'ㄱ':0,'ㄲ':1,'ㄴ':2,'ㄷ':3,'ㄸ':4,'ㄹ':5,'ㅁ':6,'ㅂ':7,'ㅃ':8,'ㅅ':9,'ㅆ':10,'ㅇ':11,'ㅈ':12,'ㅉ':13,'ㅊ':14,'ㅋ':15,'ㅌ':16,'ㅍ':17,'ㅎ':18};
const JUNG_MAP = {'ㅏ':0,'ㅐ':1,'ㅑ':2,'ㅒ':3,'ㅓ':4,'ㅔ':5,'ㅕ':6,'ㅖ':7,'ㅗ':8,'ㅘ':9,'ㅙ':10,'ㅚ':11,'ㅛ':12,'ㅜ':13,'ㅝ':14,'ㅞ':15,'ㅟ':16,'ㅠ':17,'ㅡ':18,'ㅢ':19,'ㅣ':20};
const JONG_MAP = {'':0,'ㄱ':1,'ㄲ':2,'ㄳ':3,'ㄴ':4,'ㄵ':5,'ㄶ':6,'ㄷ':7,'ㄹ':8,'ㄺ':9,'ㄻ':10,'ㄼ':11,'ㄽ':12,'ㄾ':13,'ㄿ':14,'ㅀ':15,'ㅁ':16,'ㅂ':17,'ㅄ':18,'ㅅ':19,'ㅆ':20,'ㅇ':21,'ㅈ':22,'ㅊ':23,'ㅋ':24,'ㅌ':25,'ㅍ':26,'ㅎ':27};

// 복합 종성 분리
const COMPLEX_JONG = {'ㄳ':['ㄱ','ㅅ'],'ㄵ':['ㄴ','ㅈ'],'ㄶ':['ㄴ','ㅎ'],'ㄺ':['ㄹ','ㄱ'],'ㄻ':['ㄹ','ㅁ'],'ㄼ':['ㄹ','ㅂ'],'ㄽ':['ㄹ','ㅅ'],'ㄾ':['ㄹ','ㅌ'],'ㄿ':['ㄹ','ㅍ'],'ㅀ':['ㄹ','ㅎ'],'ㅄ':['ㅂ','ㅅ']};

// 복합 종성 조합
const JONG_COMBINE = {
  'ㄱㅅ':'ㄳ','ㄴㅈ':'ㄵ','ㄴㅎ':'ㄶ',
  'ㄹㄱ':'ㄺ','ㄹㅁ':'ㄻ','ㄹㅂ':'ㄼ','ㄹㅅ':'ㄽ','ㄹㅌ':'ㄾ','ㄹㅍ':'ㄿ','ㄹㅎ':'ㅀ',
  'ㅂㅅ':'ㅄ'
};

// 복합 모음 조합
const JUNG_COMBINE = {
  'ㅗㅏ':'ㅘ','ㅗㅐ':'ㅙ','ㅗㅣ':'ㅚ',
  'ㅜㅓ':'ㅝ','ㅜㅔ':'ㅞ','ㅜㅣ':'ㅟ',
  'ㅡㅣ':'ㅢ'
};

const CHO_LIST = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const JUNG_LIST = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];

function isCho(c){return CHO_MAP.hasOwnProperty(c)}
function isJung(c){return JUNG_MAP.hasOwnProperty(c)}
function isJong(c){return JONG_MAP.hasOwnProperty(c) && c!==''}

function composeSyllable(cho,jung,jong){
  const ci=CHO_MAP[cho], ji=JUNG_MAP[jung], ki=jong?JONG_MAP[jong]:0;
  return String.fromCharCode(0xAC00+ci*21*28+ji*28+ki);
}

// 영타 → 한글 변환
function engToKor(text){
  // 영문을 자모로 변환
  const jamos=[];
  for(const ch of text){
    if(engToJamo[ch]) jamos.push(engToJamo[ch]);
    else jamos.push(ch);
  }

  // 자모를 음절로 조합
  let result='';
  let i=0;
  while(i<jamos.length){
    const cur=jamos[i];

    // 초성이 될 수 있는 자음인지
    if(isCho(cur)){
      // 다음이 모음인지 확인
      let jung=null, jungIdx=i+1;

      if(jungIdx<jamos.length && isJung(jamos[jungIdx])){
        jung=jamos[jungIdx];

        // 복합 모음 체크
        if(jungIdx+1<jamos.length){
          const combined=JUNG_COMBINE[jung+jamos[jungIdx+1]];
          if(combined){jung=combined;jungIdx++;}
        }

        // 종성 체크
        let jong=null, jongIdx=jungIdx+1;

        if(jongIdx<jamos.length && isJong(jamos[jongIdx])){
          const possibleJong=jamos[jongIdx];

          // 다음에 모음이 오면 종성이 아니라 다음 음절의 초성
          if(jongIdx+1<jamos.length && isJung(jamos[jongIdx+1])){
            // 종성 없이 현재 음절 완성
            result+=composeSyllable(cur,jung,'');
            i=jongIdx;
            continue;
          }

          // 복합 종성 체크
          if(jongIdx+1<jamos.length){
            const complexJong=JONG_COMBINE[possibleJong+jamos[jongIdx+1]];
            if(complexJong && JONG_MAP.hasOwnProperty(complexJong)){
              // 복합 종성 뒤에 모음이 오면 분리
              if(jongIdx+2<jamos.length && isJung(jamos[jongIdx+2])){
                jong=possibleJong;
                result+=composeSyllable(cur,jung,jong);
                i=jongIdx+1;
                continue;
              }
              jong=complexJong;
              result+=composeSyllable(cur,jung,jong);
              i=jongIdx+2;
              continue;
            }
          }

          jong=possibleJong;
          result+=composeSyllable(cur,jung,jong);
          i=jongIdx+1;
          continue;
        }

        result+=composeSyllable(cur,jung,'');
        i=jungIdx+1;
        continue;
      }

      // 초성만 있으면 자음 그대로
      result+=cur;
      i++;
    } else if(isJung(cur)){
      // 모음만 단독
      result+=cur;
      i++;
    } else {
      result+=cur;
      i++;
    }
  }
  return result;
}

// 한글 음절 분해
function decompose(ch){
  const code=ch.charCodeAt(0);
  if(code<0xAC00||code>0xD7A3) return null;
  const idx=code-0xAC00;
  const cho=Math.floor(idx/(21*28));
  const jung=Math.floor((idx%(21*28))/28);
  const jong=idx%28;
  return {cho:CHO_LIST[cho], jung:JUNG_LIST[jung], jong:KOR_JONG[jong]};
}

// 한타 → 영어 변환
function korToEng(text){
  let result='';
  for(const ch of text){
    const d=decompose(ch);
    if(d){
      result+=jamoToEng[d.cho]||d.cho;
      // 복합 모음 분리
      const jungParts=decomposeJung(d.jung);
      for(const jp of jungParts) result+=jamoToEng[jp]||jp;
      // 종성 분리
      if(d.jong){
        if(COMPLEX_JONG[d.jong]){
          for(const jj of COMPLEX_JONG[d.jong]) result+=jamoToEng[jj]||jj;
        } else {
          result+=jamoToEng[d.jong]||d.jong;
        }
      }
    } else if(jamoToEng[ch]){
      result+=jamoToEng[ch];
    } else {
      result+=ch;
    }
  }
  return result;
}

function decomposeJung(jung){
  const map={'ㅘ':['ㅗ','ㅏ'],'ㅙ':['ㅗ','ㅐ'],'ㅚ':['ㅗ','ㅣ'],'ㅝ':['ㅜ','ㅓ'],'ㅞ':['ㅜ','ㅔ'],'ㅟ':['ㅜ','ㅣ'],'ㅢ':['ㅡ','ㅣ']};
  return map[jung]||[jung];
}

let mode='engToKor';

const engExamples=[
  ['dkssud','안녕'],['tksrmfdlqfur','사랑이란'],['skansk','나는나'],
  ['rhksflwk','관리자'],['dkswud','안녕'],['ahtdj','메세']
];
const korExamples=[
  ['ㅗ디ㅣㅐ','hello'],['ㅈㅐㄱ디','world'],['ㅎㅐㅐㅇ','good'],
  ['ㅅㅗㅁㄷ','than'],['ㄱㄷㅁㅊㅅ','react'],['ㅔㅁㅅㅗㅐㅜ','python']
];

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-tab').forEach((tab,i)=>{
    tab.classList.toggle('active',i===(m==='engToKor'?0:1));
  });
  document.getElementById('inputLabel').textContent=
    m==='engToKor'?'영타로 잘못 친 텍스트를 입력하세요':'한타로 잘못 친 텍스트를 입력하세요';
  document.getElementById('inputText').placeholder=
    m==='engToKor'?'예: dkssud':'예: ㅗ디ㅣㅐ';
  renderExamples();
  convert();
}

function renderExamples(){
  const chips=document.getElementById('exampleChips');
  const examples=mode==='engToKor'?engExamples:korExamples;
  chips.innerHTML=examples.map(([inp,out])=>
    `<button class="example-chip" onclick="useExample('${inp}')">${inp}<span>→</span>${out}</button>`
  ).join('');
}

function useExample(text){
  document.getElementById('inputText').value=text;
  convert();
}

function convert(){
  const input=document.getElementById('inputText').value;
  const resultEl=document.getElementById('resultText');
  if(!input){
    resultEl.innerHTML='<span class="result-placeholder">입력하면 자동으로 변환됩니다</span>';
    return;
  }
  const result=mode==='engToKor'?engToKor(input):korToEng(input);
  resultEl.textContent=result;
}

function copyResult(){
  const text=document.getElementById('resultText').textContent;
  if(!text||text==='입력하면 자동으로 변환됩니다'){showToast('변환할 내용이 없습니다');return;}
  navigator.clipboard.writeText(text).then(()=>showToast('복사 완료! 📋'));
}

function clearAll(){
  document.getElementById('inputText').value='';
  document.getElementById('resultText').innerHTML='<span class="result-placeholder">입력하면 자동으로 변환됩니다</span>';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// 스크롤 탑 버튼
window.addEventListener('scroll',()=>{
  document.getElementById('scrollTopBtn').classList.toggle('visible',window.scrollY>300);
});

renderExamples();
</script>
