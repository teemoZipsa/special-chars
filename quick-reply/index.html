<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/special-chars/favicon.png">
    <title>빠른 답장 도구 / Quick Reply</title>
    <meta name="description" content="자주 쓰는 답장 문구를 빠르게 복사하세요. 인사, 확인, 일정, 요청, 사과, 축하 등 업무용 템플릿">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3501868770820650" crossorigin="anonymous"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Pretendard',-apple-system,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;justify-content:center;padding:20px}
        .app{background:#16213e;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.4);width:720px;max-width:100%;overflow:hidden;display:flex;flex-direction:column;max-height:90vh}
        .header{background:linear-gradient(135deg,#0f3460,#533483);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
        .header h1{font-size:16px;font-weight:600;color:#fff;letter-spacing:1px}
        .back-btn{background:rgba(255,255,255,.12);border:none;color:#ddd;font-size:12px;cursor:pointer;padding:5px 10px;border-radius:6px;text-decoration:none;transition:background .2s;white-space:nowrap;display:flex;align-items:center;gap:4px;font-family:inherit}
        .back-btn:hover{background:rgba(255,255,255,.22);color:#fff}

        .search-bar{padding:12px 16px;flex-shrink:0}
        .search-bar input{width:100%;padding:10px 14px;background:#2a2a5a;border:1px solid #3a3a6a;border-radius:8px;color:#e0e0ff;font-size:13px;font-family:inherit}
        .search-bar input:focus{outline:none;border-color:#533483}
        .search-bar input::placeholder{color:#6666aa}

        .tabs{display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
        .tabs::-webkit-scrollbar{height:0}
        .tab{padding:7px 14px;background:#2a2a5a;border:1px solid #3a3a6a;border-radius:20px;font-size:12px;color:#b0b0e0;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:inherit;font-weight:500}
        .tab:hover{background:#333366;color:#e0e0ff}
        .tab.active{background:#533483;color:#fff;border-color:#533483}

        .msg-list{flex:1;overflow-y:auto;padding:0 16px 12px}
        .msg-list::-webkit-scrollbar{width:4px}
        .msg-list::-webkit-scrollbar-thumb{background:#3a3a6a;border-radius:2px}
        .msg-card{display:flex;align-items:flex-start;gap:10px;padding:12px;background:#1e1e44;border:1px solid #2a2a5a;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative}
        .msg-card:hover{background:#222250;border-color:#533483}
        .msg-card.copied{background:rgba(76,175,80,.08);border-color:rgba(76,175,80,.3)}
        .msg-icon{font-size:20px;flex-shrink:0;width:28px;text-align:center;line-height:1.4}
        .msg-text{flex:1;font-size:13px;line-height:1.6;color:#e0e0ff;word-break:break-word}
        .msg-fav{position:absolute;top:8px;right:8px;background:none;border:none;font-size:14px;cursor:pointer;opacity:.4;transition:opacity .2s;padding:4px}
        .msg-fav:hover,.msg-fav.active{opacity:1}
        .msg-empty{text-align:center;padding:40px 16px;color:#6666aa;font-size:13px;line-height:1.8}

        .guide-section{margin:0 12px 0;border:1px solid #333366;border-radius:8px;overflow:hidden;flex-shrink:0}
        .guide-section summary{padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;color:#b0b0e0;list-style:none;display:flex;align-items:center;gap:6px;background:#1e1e44;transition:background .2s}
        .guide-section summary:hover{background:#2a2a5a}
        .guide-section[open] summary{background:#2a2a5a;border-bottom:1px solid #333366}
        .guide-content{padding:12px 14px;font-size:12px;color:#8888bb;line-height:1.8}
        .guide-content ol{padding-left:20px}.guide-content li{margin-bottom:4px}

        .bottom-bar{background:#1a1a3e;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #2a2a5a;flex-shrink:0}
        .bottom-bar .info{font-size:11px;color:#8888bb}
        .action-btn{padding:8px 20px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
        .btn-clear{background:#2a2a5a;color:#b0b0e0}.btn-clear:hover{background:#3a3a6a}
        .btn-add{background:#533483;color:#fff}.btn-add:hover{background:#6b44a3}

        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:center}
        .modal-overlay.show{display:flex}
        .modal{background:#16213e;border-radius:12px;padding:20px;width:90%;max-width:400px;border:1px solid #333366}
        .modal h3{color:#e0e0ff;font-size:15px;margin-bottom:12px}
        .modal textarea{width:100%;height:100px;padding:10px;background:#2a2a5a;border:1px solid #3a3a6a;border-radius:8px;color:#e0e0ff;font-size:13px;font-family:inherit;resize:vertical}
        .modal textarea:focus{outline:none;border-color:#533483}
        .modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
        .modal-btns button{padding:8px 18px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
        .btn-cancel{background:#2a2a5a;color:#b0b0e0}
        .btn-save{background:#533483;color:#fff}

        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#533483;color:#fff;padding:10px 24px;border-radius:24px;font-size:14px;font-weight:500;box-shadow:0 4px 20px rgba(83,52,131,.6);transition:transform .3s ease,opacity .3s ease;opacity:0;pointer-events:none;z-index:999}
        .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <a href="https://teemozipsa.github.io/" class="back-btn">← 도구 모음</a>
        <h1>💬 빠른 답장 도구</h1>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="문구 검색..." oninput="renderMessages()">
    </div>

    <div class="tabs" id="tabsContainer"></div>

    <div class="msg-list" id="msgList"></div>

    <details class="guide-section">
        <summary>📖 사용 방법</summary>
        <div class="guide-content">
            <ol>
                <li>카테고리 탭을 선택하여 원하는 분류의 문구를 찾으세요</li>
                <li>문구 카드를 클릭하면 즉시 클립보드에 복사됩니다</li>
                <li>❤️ 아이콘을 눌러 자주 쓰는 문구를 즐겨찾기에 등록하세요</li>
                <li>'+ 커스텀 추가' 버튼으로 나만의 문구를 저장할 수 있습니다</li>
                <li>검색창에 키워드를 입력하면 전체 문구에서 필터링됩니다</li>
            </ol>
        </div>
    </details>

    <div class="bottom-bar">
        <div class="info" id="msgCount">0개 문구</div>
        <div style="display:flex;gap:8px">
            <button class="action-btn btn-clear" onclick="resetFavorites()">즐겨찾기 초기화</button>
            <button class="action-btn btn-add" onclick="openModal()">+ 커스텀 추가</button>
        </div>
    </div>
</div>

<!-- Custom add modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <h3>📝 커스텀 문구 추가</h3>
        <textarea id="customText" placeholder="저장할 문구를 입력하세요..."></textarea>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn-save" onclick="saveCustom()">저장</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATEGORIES = [
    { id:'all', label:'전체', icon:'' },
    { id:'fav', label:'⭐ 즐겨찾기', icon:'' },
    { id:'greet', label:'👋 인사·감사', icon:'👋' },
    { id:'confirm', label:'✅ 확인·완료', icon:'✅' },
    { id:'schedule', label:'📅 일정·약속', icon:'📅' },
    { id:'request', label:'📩 요청·문의', icon:'📩' },
    { id:'sorry', label:'🙏 사과·양해', icon:'🙏' },
    { id:'celebrate', label:'🎉 축하·위로', icon:'🎉' },
    { id:'custom', label:'📝 커스텀', icon:'📝' }
];

const MESSAGES = [
    // 인사·감사
    { cat:'greet', icon:'👋', text:'안녕하세요, 좋은 하루 되세요!' },
    { cat:'greet', icon:'👋', text:'안녕하세요, 연락 주셔서 감사합니다.' },
    { cat:'greet', icon:'🙏', text:'항상 감사드립니다.' },
    { cat:'greet', icon:'😊', text:'덕분에 잘 처리되었습니다. 감사합니다!' },
    { cat:'greet', icon:'👋', text:'오랜만에 연락드립니다. 잘 지내고 계신가요?' },
    { cat:'greet', icon:'🌅', text:'좋은 아침입니다! 오늘도 좋은 하루 되세요.' },
    { cat:'greet', icon:'🌙', text:'늦은 시간에 연락드려 죄송합니다.' },
    { cat:'greet', icon:'🤝', text:'앞으로도 잘 부탁드립니다.' },
    // 확인·완료
    { cat:'confirm', icon:'✅', text:'네, 확인했습니다.' },
    { cat:'confirm', icon:'✅', text:'접수되었습니다. 확인 후 안내드리겠습니다.' },
    { cat:'confirm', icon:'✅', text:'처리 완료되었습니다.' },
    { cat:'confirm', icon:'👍', text:'네, 알겠습니다. 그렇게 진행하겠습니다.' },
    { cat:'confirm', icon:'📋', text:'말씀하신 내용 확인했습니다. 반영하겠습니다.' },
    { cat:'confirm', icon:'✅', text:'전달 완료했습니다.' },
    { cat:'confirm', icon:'📨', text:'메일로 발송해 드렸습니다. 확인 부탁드립니다.' },
    // 일정·약속
    { cat:'schedule', icon:'📅', text:'내일 ○시에 가능하신가요?' },
    { cat:'schedule', icon:'📅', text:'일정 확인 부탁드립니다.' },
    { cat:'schedule', icon:'⏰', text:'약속 시간 30분 전에 다시 연락드리겠습니다.' },
    { cat:'schedule', icon:'📅', text:'혹시 이번 주 중으로 시간이 되실까요?' },
    { cat:'schedule', icon:'🔄', text:'일정 변경이 필요한데, 가능하신 시간을 알려주시면 감사하겠습니다.' },
    { cat:'schedule', icon:'📍', text:'장소는 ○○입니다. 오시는 길 안내해 드릴까요?' },
    { cat:'schedule', icon:'✅', text:'네, 그 시간으로 확정하겠습니다.' },
    // 요청·문의
    { cat:'request', icon:'📩', text:'확인 부탁드립니다.' },
    { cat:'request', icon:'📩', text:'회신 부탁드립니다.' },
    { cat:'request', icon:'📩', text:'검토 부탁드립니다.' },
    { cat:'request', icon:'📎', text:'첨부 파일 확인 부탁드립니다.' },
    { cat:'request', icon:'❓', text:'혹시 관련해서 추가 문의 사항이 있으시면 편하게 말씀해 주세요.' },
    { cat:'request', icon:'📞', text:'전화 통화 가능하시면 연락 부탁드립니다.' },
    { cat:'request', icon:'⏳', text:'급하지 않으니 여유 있으실 때 확인 부탁드립니다.' },
    { cat:'request', icon:'📄', text:'관련 자료 공유 부탁드립니다.' },
    // 사과·양해
    { cat:'sorry', icon:'🙏', text:'늦어서 죄송합니다.' },
    { cat:'sorry', icon:'🙏', text:'답변이 늦어 죄송합니다.' },
    { cat:'sorry', icon:'🙏', text:'불편을 드려 대단히 죄송합니다.' },
    { cat:'sorry', icon:'🙏', text:'양해 부탁드립니다.' },
    { cat:'sorry', icon:'🙇', text:'착오가 있었습니다. 다시 확인 후 안내드리겠습니다.' },
    { cat:'sorry', icon:'⏳', text:'처리에 시간이 좀 걸릴 수 있습니다. 양해 부탁드립니다.' },
    // 축하·위로
    { cat:'celebrate', icon:'🎉', text:'축하드립니다!' },
    { cat:'celebrate', icon:'🎂', text:'생일 축하드립니다! 행복한 하루 되세요.' },
    { cat:'celebrate', icon:'💐', text:'승진 축하드립니다! 앞으로도 응원하겠습니다.' },
    { cat:'celebrate', icon:'🏥', text:'빠른 쾌유를 빕니다. 건강이 최고입니다.' },
    { cat:'celebrate', icon:'💪', text:'힘내세요! 응원하고 있습니다.' },
    { cat:'celebrate', icon:'🙏', text:'삼가 조의를 표합니다.' },
    { cat:'celebrate', icon:'🎊', text:'새해 복 많이 받으세요!' }
];

let currentTab = 'all';
let favorites = JSON.parse(localStorage.getItem('qr_favorites') || '[]');
let customs = JSON.parse(localStorage.getItem('qr_customs') || '[]');

function renderTabs() {
    const container = document.getElementById('tabsContainer');
    container.innerHTML = CATEGORIES.map(c =>
        `<button class="tab ${c.id === currentTab ? 'active' : ''}" onclick="switchTab('${c.id}')">${c.label}</button>`
    ).join('');
}

function switchTab(id) {
    currentTab = id;
    renderTabs();
    renderMessages();
}

function getAllMessages() {
    const all = [...MESSAGES, ...customs.map(t => ({ cat:'custom', icon:'📝', text:t, isCustom:true }))];
    return all;
}

function renderMessages() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    let msgs = getAllMessages();

    if (currentTab === 'fav') {
        msgs = msgs.filter(m => favorites.includes(m.text));
    } else if (currentTab !== 'all') {
        msgs = msgs.filter(m => m.cat === currentTab);
    }

    if (query) {
        msgs = msgs.filter(m => m.text.toLowerCase().includes(query));
    }

    const list = document.getElementById('msgList');
    if (msgs.length === 0) {
        list.innerHTML = `<div class="msg-empty">${currentTab === 'fav' ? '⭐ 즐겨찾기한 문구가 없습니다<br>문구 카드의 ❤️를 눌러 추가하세요' : currentTab === 'custom' ? '📝 커스텀 문구가 없습니다<br>아래 + 버튼으로 추가하세요' : '검색 결과가 없습니다'}</div>`;
    } else {
        list.innerHTML = msgs.map((m, i) => {
            const isFav = favorites.includes(m.text);
            const deleteBtn = m.isCustom ? `<button class="msg-fav" style="right:32px" onclick="event.stopPropagation();deleteCustom(${i})" title="삭제">🗑️</button>` : '';
            return `<div class="msg-card" onclick="copyMsg(this, '${escapeHtml(m.text)}')">
                <span class="msg-icon">${m.icon}</span>
                <span class="msg-text">${m.text}</span>
                ${deleteBtn}
                <button class="msg-fav ${isFav ? 'active' : ''}" onclick="event.stopPropagation();toggleFav('${escapeHtml(m.text)}',this)" title="즐겨찾기">${isFav ? '❤️' : '🤍'}</button>
            </div>`;
        }).join('');
    }

    document.getElementById('msgCount').textContent = `${msgs.length}개 문구`;
}

function escapeHtml(str) {
    return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function copyMsg(card, text) {
    text = text.replace(/\\'/g, "'").replace(/&quot;/g, '"');
    navigator.clipboard.writeText(text).then(() => {
        card.classList.add('copied');
        setTimeout(() => card.classList.remove('copied'), 800);
        showToast('복사 완료!');
    });
}

function toggleFav(text, btn) {
    text = text.replace(/\\'/g, "'").replace(/&quot;/g, '"');
    const idx = favorites.indexOf(text);
    if (idx >= 0) {
        favorites.splice(idx, 1);
        btn.classList.remove('active');
        btn.textContent = '🤍';
    } else {
        favorites.push(text);
        btn.classList.add('active');
        btn.textContent = '❤️';
    }
    localStorage.setItem('qr_favorites', JSON.stringify(favorites));
    if (currentTab === 'fav') renderMessages();
}

function resetFavorites() {
    if (favorites.length === 0) { showToast('즐겨찾기가 비어있습니다'); return; }
    favorites = [];
    localStorage.setItem('qr_favorites', JSON.stringify(favorites));
    renderMessages();
    showToast('즐겨찾기가 초기화되었습니다');
}

function openModal() {
    document.getElementById('customText').value = '';
    document.getElementById('modalOverlay').classList.add('show');
    document.getElementById('customText').focus();
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
}

function saveCustom() {
    const text = document.getElementById('customText').value.trim();
    if (!text) { showToast('문구를 입력해주세요'); return; }
    customs.push(text);
    localStorage.setItem('qr_customs', JSON.stringify(customs));
    closeModal();
    switchTab('custom');
    showToast('커스텀 문구가 추가되었습니다');
}

function deleteCustom(globalIdx) {
    // Find the custom message by filtering
    const allMsgs = getAllMessages();
    const msg = allMsgs.filter(m => {
        if (currentTab === 'fav') return favorites.includes(m.text);
        if (currentTab !== 'all' && currentTab !== 'custom') return m.cat === currentTab;
        if (currentTab === 'custom') return m.cat === 'custom';
        return true;
    });
    // Find in customs array
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    let filtered = getAllMessages().filter(m => m.cat === 'custom');
    if (query) filtered = filtered.filter(m => m.text.toLowerCase().includes(query));
    const customMsgs = getAllMessages().filter(m => m.isCustom);
    // Simple: find the text and remove from customs
    const visibleCustoms = customs.filter(t => !query || t.toLowerCase().includes(query));
    const adjustedIdx = globalIdx - MESSAGES.length;
    if (adjustedIdx >= 0 && adjustedIdx < customs.length) {
        customs.splice(adjustedIdx, 1);
        localStorage.setItem('qr_customs', JSON.stringify(customs));
        renderMessages();
        showToast('삭제되었습니다');
    }
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1500);
}

// Init
renderTabs();
renderMessages();
</script>
</body>
</html>
