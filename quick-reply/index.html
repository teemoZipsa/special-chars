        *{margin:0;padding:0;box-sizing:border-box}

        .tabs-wrap{position:relative;flex-shrink:0}

        .tabs-wrap::before{left:0;background:linear-gradient(to right,#16213e,transparent)}
        .tabs-wrap::after{right:0;background:linear-gradient(to left,#16213e,transparent)}
        .tabs-wrap.at-start::before{opacity:0}

        .tabs{display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;cursor:grab}

        .tabs.dragging{cursor:grabbing;scroll-behavior:auto}

        .tab:hover{background:var(--bg-btn)366;color:var(--text-primary)}

        .msg-list{flex:1;overflow-y:auto;padding:0 16px 12px}

        .msg-card{display:flex;align-items:flex-start;gap:10px;padding:12px;background:var(--bg-guide);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative}
        .msg-card:hover{background:var(--bg-input);border-color:var(--accent)}

        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:center}

        .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.scroll-top-btn{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--accent);color:var(--text-on-accent);border:none;font-size:20px;font-weight:700;cursor:pointer;z-index:900;box-shadow:0 2px 12px rgba(83,52,131,.5);opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s,transform .2s}
.scroll-top-btn.visible{opacity:1;visibility:visible}
.scroll-top-btn:hover{transform:scale(1.1);background:var(--accent-hover)}
@media(max-width:640px){.scroll-top-btn{bottom:70px;right:16px;width:40px;height:40px;font-size:18px}}

    <div class="modal">
        <h3>📝 커스텀 문구 추가</h3>

<script>
const CATEGORIES = [
    { id:'all', label:'전체', icon:'' },
    { id:'fav', label:'⭐ 즐겨찾기', icon:'' },
    { id:'greet', label:'👋 인사·감사', icon:'👋' },
    { id:'confirm', label:'✅ 확인·완료', icon:'✅' },
    { id:'schedule', label:'📅 일정·약속', icon:'📅' },
    { id:'request', label:'📩 요청·문의', icon:'📩' },
    { id:'sorry', label:'🙏 사과·양해', icon:'🙏' },
    { id:'celebrate', label:'🎉 축하·위로', icon:'🎉' },
    { id:'custom', label:'📝 커스텀', icon:'📝' }
];

const MESSAGES = [
    // 인사·감사
    { cat:'greet', icon:'👋', text:'안녕하세요, 좋은 하루 되세요!' },
    { cat:'greet', icon:'👋', text:'안녕하세요, 연락 주셔서 감사합니다.' },
    { cat:'greet', icon:'🙏', text:'항상 감사드립니다.' },
    { cat:'greet', icon:'😊', text:'덕분에 잘 처리되었습니다. 감사합니다!' },
    { cat:'greet', icon:'👋', text:'오랜만에 연락드립니다. 잘 지내고 계신가요?' },
    { cat:'greet', icon:'🌅', text:'좋은 아침입니다! 오늘도 좋은 하루 되세요.' },
    { cat:'greet', icon:'🌙', text:'늦은 시간에 연락드려 죄송합니다.' },
    { cat:'greet', icon:'🤝', text:'앞으로도 잘 부탁드립니다.' },
    // 확인·완료
    { cat:'confirm', icon:'✅', text:'네, 확인했습니다.' },
    { cat:'confirm', icon:'✅', text:'접수되었습니다. 확인 후 안내드리겠습니다.' },
    { cat:'confirm', icon:'✅', text:'처리 완료되었습니다.' },
    { cat:'confirm', icon:'👍', text:'네, 알겠습니다. 그렇게 진행하겠습니다.' },
    { cat:'confirm', icon:'📋', text:'말씀하신 내용 확인했습니다. 반영하겠습니다.' },
    { cat:'confirm', icon:'✅', text:'전달 완료했습니다.' },
    { cat:'confirm', icon:'📨', text:'메일로 발송해 드렸습니다. 확인 부탁드립니다.' },
    // 일정·약속
    { cat:'schedule', icon:'📅', text:'내일 ○시에 가능하신가요?' },
    { cat:'schedule', icon:'📅', text:'일정 확인 부탁드립니다.' },
    { cat:'schedule', icon:'⏰', text:'약속 시간 30분 전에 다시 연락드리겠습니다.' },
    { cat:'schedule', icon:'📅', text:'혹시 이번 주 중으로 시간이 되실까요?' },
    { cat:'schedule', icon:'🔄', text:'일정 변경이 필요한데, 가능하신 시간을 알려주시면 감사하겠습니다.' },
    { cat:'schedule', icon:'📍', text:'장소는 ○○입니다. 오시는 길 안내해 드릴까요?' },
    { cat:'schedule', icon:'✅', text:'네, 그 시간으로 확정하겠습니다.' },
    // 요청·문의
    { cat:'request', icon:'📩', text:'확인 부탁드립니다.' },
    { cat:'request', icon:'📩', text:'회신 부탁드립니다.' },
    { cat:'request', icon:'📩', text:'검토 부탁드립니다.' },
    { cat:'request', icon:'📎', text:'첨부 파일 확인 부탁드립니다.' },
    { cat:'request', icon:'❓', text:'혹시 관련해서 추가 문의 사항이 있으시면 편하게 말씀해 주세요.' },
    { cat:'request', icon:'📞', text:'전화 통화 가능하시면 연락 부탁드립니다.' },
    { cat:'request', icon:'⏳', text:'급하지 않으니 여유 있으실 때 확인 부탁드립니다.' },
    { cat:'request', icon:'📄', text:'관련 자료 공유 부탁드립니다.' },
    // 사과·양해
    { cat:'sorry', icon:'🙏', text:'늦어서 죄송합니다.' },
    { cat:'sorry', icon:'🙏', text:'답변이 늦어 죄송합니다.' },
    { cat:'sorry', icon:'🙏', text:'불편을 드려 대단히 죄송합니다.' },
    { cat:'sorry', icon:'🙏', text:'양해 부탁드립니다.' },
    { cat:'sorry', icon:'🙇', text:'착오가 있었습니다. 다시 확인 후 안내드리겠습니다.' },
    { cat:'sorry', icon:'⏳', text:'처리에 시간이 좀 걸릴 수 있습니다. 양해 부탁드립니다.' },
    // 축하·위로
    { cat:'celebrate', icon:'🎉', text:'축하드립니다!' },
    { cat:'celebrate', icon:'🎂', text:'생일 축하드립니다! 행복한 하루 되세요.' },
    { cat:'celebrate', icon:'💐', text:'승진 축하드립니다! 앞으로도 응원하겠습니다.' },
    { cat:'celebrate', icon:'🏥', text:'빠른 쾌유를 빕니다. 건강이 최고입니다.' },
    { cat:'celebrate', icon:'💪', text:'힘내세요! 응원하고 있습니다.' },
    { cat:'celebrate', icon:'🙏', text:'삼가 조의를 표합니다.' },
    { cat:'celebrate', icon:'🎊', text:'새해 복 많이 받으세요!' }
];

let currentTab = 'all';
let favorites;
try { favorites = JSON.parse(localStorage.getItem('qr_favorites') || '[]'); } catch { favorites = []; }
let customs;
try { customs = JSON.parse(localStorage.getItem('qr_customs') || '[]'); } catch { customs = []; }

function renderTabs() {
    const container = document.getElementById('tabsContainer');
    container.innerHTML = CATEGORIES.map(c =>
        `<button class="tab ${c.id === currentTab ? 'active' : ''}" onclick="switchTab('${c.id}')">${c.label}</button>`
    ).join('');
}

function switchTab(id) {
    currentTab = id;
    renderTabs();
    renderMessages();
    // 활성 탭을 뷰포트 안으로 스크롤
    setTimeout(() => {
        const active = document.querySelector('.tab.active');
        if (active) active.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
    }, 10);
}

function getAllMessages() {
    const all = [...MESSAGES, ...customs.map(t => ({ cat:'custom', icon:'📝', text:t, isCustom:true }))];
    return all;
}

function renderMessages() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    let msgs = getAllMessages();

    if (currentTab === 'fav') {
        msgs = msgs.filter(m => favorites.includes(m.text));
    } else if (currentTab !== 'all') {
        msgs = msgs.filter(m => m.cat === currentTab);
    }

    if (query) {
        msgs = msgs.filter(m => m.text.toLowerCase().includes(query));
    }

    const list = document.getElementById('msgList');
    if (msgs.length === 0) {
        list.innerHTML = `<div class="msg-empty">${currentTab === 'fav' ? '⭐ 즐겨찾기한 문구가 없습니다<br>문구 카드의 ❤️를 눌러 추가하세요' : currentTab === 'custom' ? '📝 커스텀 문구가 없습니다<br>아래 + 버튼으로 추가하세요' : '검색 결과가 없습니다'}</div>`;
    } else {
        list.innerHTML = msgs.map((m, i) => {
            const isFav = favorites.includes(m.text);
            const deleteBtn = m.isCustom ? `<button class="msg-fav" style="right:32px" onclick="event.stopPropagation();deleteCustom(${i})" title="삭제">🗑️</button>` : '';
            return `<div class="msg-card" onclick="copyMsg(this, '${escapeHtml(m.text)}')">
                <span class="msg-icon">${m.icon}</span>
                <span class="msg-text">${escapeHtml(m.text)}</span>
                ${deleteBtn}
                <button class="msg-fav ${isFav ? 'active' : ''}" onclick="event.stopPropagation();toggleFav('${escapeHtml(m.text)}',this)" title="즐겨찾기">${isFav ? '❤️' : '🤍'}</button>
            </div>`;
        }).join('');
    }

    document.getElementById('msgCount').textContent = `${msgs.length}개 문구`;
}

function escapeHtml(str) {
    return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function copyMsg(card, text) {
    text = text.replace(/\\'/g, "'").replace(/&quot;/g, '"');
    navigator.clipboard.writeText(text).then(() => {
        card.classList.add('copied');
        setTimeout(() => card.classList.remove('copied'), 800);
        showToast('복사 완료!');
    });
}

function toggleFav(text, btn) {
    text = text.replace(/\\'/g, "'").replace(/&quot;/g, '"');
    const idx = favorites.indexOf(text);
    if (idx >= 0) {
        favorites.splice(idx, 1);
        btn.classList.remove('active');
        btn.textContent = '🤍';
    } else {
        favorites.push(text);
        btn.classList.add('active');
        btn.textContent = '❤️';
    }
    try { localStorage.setItem('qr_favorites', JSON.stringify(favorites)); } catch {}
    if (currentTab === 'fav') renderMessages();
}

function resetFavorites() {
    if (favorites.length === 0) { showToast('즐겨찾기가 비어있습니다'); return; }
    favorites = [];
    try { localStorage.setItem('qr_favorites', JSON.stringify(favorites)); } catch {}
    renderMessages();
    showToast('즐겨찾기가 초기화되었습니다');
}

let _modalTrigger = null;
function openModal() {
    _modalTrigger = document.activeElement;
    document.getElementById('customText').value = '';
    document.getElementById('modalOverlay').classList.add('show');
    document.getElementById('customText').focus();
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
    if (_modalTrigger) { _modalTrigger.focus(); _modalTrigger = null; }
}

document.getElementById('modalOverlay').addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { closeModal(); return; }
    if (e.key !== 'Tab') return;
    const focusable = this.querySelectorAll('textarea, button');
    const first = focusable[0], last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
});

function saveCustom() {
    const text = document.getElementById('customText').value.trim();
    if (!text) { showToast('문구를 입력해주세요'); return; }
    customs.push(text);
    try { localStorage.setItem('qr_customs', JSON.stringify(customs)); } catch {}
    closeModal();
    switchTab('custom');
    showToast('커스텀 문구가 추가되었습니다');
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1500);
}

// === 탭 드래그 스크롤 ===
(function() {
    const wrap = document.getElementById('tabsWrap');
    const tabs = document.getElementById('tabsContainer');
    let isDragging = false, startX, scrollLeft, moved = false;

    function updateIndicators() {
        const sl = tabs.scrollLeft, max = tabs.scrollWidth - tabs.clientWidth;
        wrap.classList.toggle('at-start', sl <= 4);
        wrap.classList.toggle('at-end', sl >= max - 4);
    }

    tabs.addEventListener('scroll', updateIndicators);
    window.addEventListener('resize', updateIndicators);

    // Mouse drag
    tabs.addEventListener('mousedown', e => {
        isDragging = true; moved = false;
        startX = e.pageX - tabs.offsetLeft;
        scrollLeft = tabs.scrollLeft;
        tabs.classList.add('dragging');
    });
    document.addEventListener('mousemove', e => {
        if (!isDragging) return;
        e.preventDefault();
        const x = e.pageX - tabs.offsetLeft;
        const walk = (x - startX) * 1.5;
        if (Math.abs(walk) > 3) moved = true;
        tabs.scrollLeft = scrollLeft - walk;
    });
    document.addEventListener('mouseup', () => {
        isDragging = false;
        tabs.classList.remove('dragging');
    });

    // 드래그 후 탭 클릭 방지
    tabs.addEventListener('click', e => {
        if (moved) { e.stopPropagation(); e.preventDefault(); moved = false; }
    }, true);

    // 초기 체크
    setTimeout(updateIndicators, 100);
})();
