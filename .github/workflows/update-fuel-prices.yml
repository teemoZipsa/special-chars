name: Update Fuel Prices

on:
  schedule:
    # 매일 한국시간 오전 10시 (UTC 01:00)에 실행
    - cron: '0 1 * * *'
  workflow_dispatch: # 수동 실행도 가능

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and update fuel prices
        env:
          OPINET_API_KEY: ${{ secrets.OPINET_API_KEY }}
        run: python .github/scripts/update_fuel_prices.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fuel-prices.json
          git diff --staged --quiet || (git commit -m "chore: update fuel prices [automated]" && git push)
