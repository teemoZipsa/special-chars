<html lang="ko">
<head>
<meta charset="UTF-8">
<script>(function(){var t;try{t=localStorage.getItem('theme')}catch(e){}if(t!=='light'&&t!=='dark'){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}document.documentElement.setAttribute('data-theme',t)})()</script>

<meta name="description" content="안전한 비밀번호를 즉시 생성하세요. 길이, 대소문자, 숫자, 특수문자 옵션 설정. 100% 브라우저 로컬 처리.">
<meta property="og:title" content="🔐 비밀번호 생성기 — 티모집사">
<meta property="og:description" content="안전한 비밀번호를 즉시 생성하세요. 100% 브라우저 로컬 처리.">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3501868770820650" crossorigin="anonymous"></script>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg-body);color:var(--text-primary);min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:flex-start}
.app{background:var(--bg-app);border-radius:16px;box-shadow:var(--shadow-lg);width:480px;max-width:100%;overflow:hidden}
.header{background:var(--bg-header);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:15px;font-weight:600;color:#fff}
.back-btn{background:rgba(255,255,255,.15);border:none;color:rgba(255,255,255,.9);font-size:12px;cursor:pointer;padding:5px 10px;border-radius:6px;text-decoration:none;transition:background .2s;font-family:inherit;display:flex;align-items:center;gap:4px}
.back-btn:hover{background:rgba(255,255,255,.25);color:#fff}
.content{padding:24px 20px}

.pw-display{background:var(--bg-bar);border:2px solid #3a3a6a;border-radius:12px;padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;min-height:60px}
.pw-text{flex:1;font-family:'Pretendard',monospace;font-size:20px;font-weight:600;word-break:break-all;line-height:1.4;color:var(--text-primary);letter-spacing:1px}
.pw-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.pw-btn{width:40px;height:40px;border-radius:10px;border:none;font-size:18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.pw-btn:active{transform:scale(.9)}
.btn-copy{background:var(--accent);color:var(--text-on-accent)}
.btn-copy:hover{background:var(--accent-hover)}
.btn-regen{background:var(--bg-btn);color:var(--text-label)}
.btn-regen:hover{background:var(--bg-btn-hover);color:var(--text-primary)}

.strength-bar{height:6px;background:var(--bg-btn);border-radius:3px;margin-bottom:6px;overflow:hidden}
.strength-fill{height:100%;border-radius:3px;transition:width .3s,background .3s}
.strength-label{font-size:12px;text-align:right;margin-bottom:16px;font-weight:600}

.section-title{font-size:13px;color:var(--text-section);font-weight:600;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}

.length-row{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.length-row input[type=range]{flex:1;accent-color:#533483;height:6px}
.length-value{background:var(--bg-btn);padding:6px 12px;border-radius:8px;font-size:16px;font-weight:700;min-width:44px;text-align:center;color:var(--text-primary)}

.options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.option{display:flex;align-items:center;gap:10px;padding:12px;background:var(--bg-btn);border-radius:10px;cursor:pointer;user-select:none;transition:background .2s}
.option:hover{background:var(--bg-btn-hover)}
.option input{display:none}
.checkbox{width:22px;height:22px;border:2px solid #555;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0}
.option input:checked~.checkbox{background:var(--accent);border-color:var(--accent)}
.option-label{font-size:13px;line-height:1.3}
.option-label small{display:block;color:var(--text-muted);font-size:11px;margin-top:2px}

.history-section{margin-top:20px}
.history-list{max-height:160px;overflow-y:auto}
.history-list::-webkit-scrollbar{width:4px}
.history-list::-webkit-scrollbar-thumb{background:var(--bg-btn-hover);border-radius:2px}
.history-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border);font-size:13px;font-family:monospace;color:var(--text-label);cursor:pointer;transition:background .2s}
.history-item:hover{background:rgba(83,52,131,.15);color:var(--text-primary)}
.history-item .idx{color:var(--text-muted);font-size:11px;width:16px}
.history-empty{text-align:center;color:var(--text-muted);padding:16px;font-size:13px}

.guide{padding:0 20px 20px}
.guide summary{font-size:13px;color:var(--text-section);cursor:pointer;padding:8px 0}
.guide-content{font-size:12px;color:var(--text-info);line-height:1.8;padding:8px 0}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg-btn);color:var(--text-primary);padding:10px 24px;border-radius:24px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.3);opacity:0;transition:transform .3s,opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.scroll-top-btn{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--accent);color:var(--text-on-accent);border:none;font-size:20px;font-weight:700;cursor:pointer;z-index:900;box-shadow:0 2px 12px rgba(83,52,131,.5);opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s,transform .2s}
.scroll-top-btn.visible{opacity:1;visibility:visible}
.scroll-top-btn:hover{transform:scale(1.1);background:var(--accent-hover)}
.footer{background:var(--bg-bar);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);font-size:11px;color:var(--text-info)}
.footer a{color:var(--text-info);text-decoration:none;font-weight:600;transition:color .2s}
.footer a:hover{color:var(--text-secondary)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <a href="https://teemozipsa.github.io/" class="back-btn">← 도구 모음</a>
    <h1>🔐 비밀번호 생성기</h1>
  </div>
  <div class="content">
    <div class="pw-display">
      <div class="pw-text" id="pwText">-</div>
      <div class="pw-actions">
        <button class="pw-btn btn-copy" onclick="copyPw()" title="복사">📋</button>
        <button class="pw-btn btn-regen" onclick="generate()" title="재생성">🔄</button>
      </div>
    </div>

    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    <div class="strength-label" id="strengthLabel">-</div>

    <div class="section-title">길이</div>
    <div class="length-row">
      <input type="range" id="pwLength" min="4" max="64" value="16" oninput="onLengthChange()">
      <div class="length-value" id="lengthDisplay">16</div>
    </div>

    <div class="section-title">포함 문자</div>
    <div class="options">
      <label class="option">
        <input type="checkbox" id="optUpper" checked onchange="generate()">
        <span class="checkbox">✓</span>
        <span class="option-label">대문자<small>A-Z</small></span>
      </label>
      <label class="option">
        <input type="checkbox" id="optLower" checked onchange="generate()">
        <span class="checkbox">✓</span>
        <span class="option-label">소문자<small>a-z</small></span>
      </label>
      <label class="option">
        <input type="checkbox" id="optNum" checked onchange="generate()">
        <span class="checkbox">✓</span>
        <span class="option-label">숫자<small>0-9</small></span>
      </label>
      <label class="option">
        <input type="checkbox" id="optSpecial" checked onchange="generate()">
        <span class="checkbox">✓</span>
        <span class="option-label">특수문자<small>!@#$%...</small></span>
      </label>
    </div>

    <div class="history-section">
      <div class="section-title">최근 생성 기록</div>
      <div class="history-list" id="historyList">
        <div class="history-empty">아직 생성된 비밀번호가 없습니다</div>
      </div>
    </div>
  </div>

  <details class="guide">
    <summary>💡 사용 가이드</summary>
    <div class="guide-content">
      • 모든 비밀번호는 브라우저에서 생성되며 서버로 전송되지 않습니다.<br>
      • 대문자, 소문자, 숫자, 특수문자를 모두 포함하면 가장 안전합니다.<br>
      • 길이가 길수록 보안 강도가 높아집니다. 12자 이상을 권장합니다.<br>
      • 최근 생성 기록을 클릭하면 해당 비밀번호를 복사할 수 있습니다.<br>
      • 기록은 페이지를 닫으면 사라지며 저장되지 않습니다.
    </div>
  </details>
    <div class="footer"><span>100% 브라우저 로컬 생성</span><a href="https://teemozipsa.github.io/">😺 더 많은 도구</a></div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<button class="scroll-top-btn" aria-label="맨 위로">↑</button>

<script>
const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const LOWER = 'abcdefghijklmnopqrstuvwxyz';
const NUMS = '0123456789';
const SPECIAL = '!@#$%^&*()_+-=[]{}|;:,.<>?';

let history = [];

function getCharset() {
  let cs = '';
  if (document.getElementById('optUpper').checked) cs += UPPER;
  if (document.getElementById('optLower').checked) cs += LOWER;
  if (document.getElementById('optNum').checked) cs += NUMS;
  if (document.getElementById('optSpecial').checked) cs += SPECIAL;
  return cs;
}

function generate() {
  const charset = getCharset();
  if (!charset) {
    document.getElementById('pwText').textContent = '최소 1개 옵션을 선택하세요';
    updateStrength('');
    return;
  }
  const len = parseInt(document.getElementById('pwLength').value);
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  let pw = '';
  for (let i = 0; i < len; i++) {
    pw += charset[arr[i] % charset.length];
  }
  document.getElementById('pwText').textContent = pw;
  updateStrength(pw);

  // Add to history (max 10, no duplicates)
  history = history.filter(h => h !== pw);
  history.unshift(pw);
  if (history.length > 10) history.pop();
  renderHistory();
}

function updateStrength(pw) {
  const fill = document.getElementById('strengthFill');
  const label = document.getElementById('strengthLabel');
  if (!pw) {
    fill.style.width = '0%';
    label.textContent = '-';
    label.style.color = '#666';
    return;
  }

  let score = 0;
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;
  if (pw.length >= 16) score++;
  if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) score++;
  if (/\d/.test(pw)) score++;
  if (/[^a-zA-Z0-9]/.test(pw)) score++;

  const levels = [
    { max: 2, pct: '20%', color: '#ef4444', text: '약함' },
    { max: 3, pct: '45%', color: '#f59e0b', text: '보통' },
    { max: 4, pct: '70%', color: '#22c55e', text: '강함' },
    { max: 99, pct: '100%', color: '#10b981', text: '매우 강함' }
  ];
  const lv = levels.find(l => score <= l.max);
  fill.style.width = lv.pct;
  fill.style.background = lv.color;
  label.textContent = '강도: ' + lv.text;
  label.style.color = lv.color;
}

function copyPw() {
  const pw = document.getElementById('pwText').textContent;
  if (!pw || pw === '-' || pw.includes('선택하세요')) return;
  navigator.clipboard.writeText(pw).then(() => showToast('📋 비밀번호가 복사되었습니다'));
}

function renderHistory() {
  const container = document.getElementById('historyList');
  if (history.length === 0) {
    container.innerHTML = '<div class="history-empty">아직 생성된 비밀번호가 없습니다</div>';
    return;
  }
  container.innerHTML = history.map((pw, i) =>
    `<div class="history-item" onclick="copyHistoryItem(${i})" title="클릭하여 복사"><span class="idx">${i + 1}</span><span>${escapeHtml(pw)}</span></div>`
  ).join('');
}

function copyHistoryItem(idx) {
  navigator.clipboard.writeText(history[idx]).then(() => showToast('📋 복사되었습니다'));
}

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function onLengthChange() {
  document.getElementById('lengthDisplay').textContent = document.getElementById('pwLength').value;
  generate();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1500);
}

generate();

(function(){var b=document.querySelector('.scroll-top-btn');if(!b)return;window.addEventListener('scroll',function(){b.classList.toggle('visible',window.scrollY>200)});b.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'})})})();
</script>
<script src="/special-chars/theme-toggle.js"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/special-chars/sw.js').catch(function(){})}</script>
</body>
</html>
