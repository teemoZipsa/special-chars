<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/special-chars/favicon.png">
<title>📷 QR 코드 생성기 — 티모집사</title>
<meta name="description" content="텍스트, URL, 연락처 등을 QR 코드로 즉시 생성하고 다운로드하세요.">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3501868770820650" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard',sans-serif;background:#0f0f23;color:#e0e0f0;min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:flex-start}
  .app{background:#16213e;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.5);width:440px;max-width:100%;overflow:hidden}
  .header{background:linear-gradient(135deg,#0f3460,#533483);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
  .back-btn{background:rgba(255,255,255,.12);border:none;color:#ddd;font-size:12px;cursor:pointer;padding:5px 10px;border-radius:6px;text-decoration:none;transition:background .2s;font-family:inherit;display:flex;align-items:center;gap:4px}
  .back-btn:hover{background:rgba(255,255,255,.22);color:#fff}
  .header h1{font-size:15px;font-weight:600;color:#fff}
  .body{padding:16px;display:flex;flex-direction:column;gap:14px}
  textarea{background:#1a1a3e;border:1px solid #2a2a5a;border-radius:10px;color:#e0e0ff;padding:14px;font-size:14px;font-family:inherit;outline:none;resize:vertical;min-height:100px;width:100%}
  textarea:focus{border-color:#533483}
  textarea::placeholder{color:#444466}
  .qr-box{display:none;background:#fff;border-radius:12px;padding:20px;text-align:center;align-self:center}
  .qr-box canvas{max-width:100%}
  .btn-row{display:flex;gap:8px}
  .btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s}
  .btn-primary{background:linear-gradient(135deg,#533483,#6b44a3);color:#fff}
  .btn-secondary{background:#1a1a3e;border:1px solid #2a2a5a;color:#8888bb}
  .btn:hover{opacity:.85}
  .size-row{display:flex;align-items:center;gap:10px}
  .size-row label{font-size:11px;color:#6666aa;font-weight:600;white-space:nowrap}
  .size-row select{background:#1a1a3e;border:1px solid #2a2a5a;border-radius:6px;color:#e0e0ff;padding:6px 10px;font-size:12px;font-family:inherit;outline:none}
  .footer{background:#1a1a3e;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #2a2a5a;font-size:11px;color:#6666aa}
  .footer a{color:#8888bb;text-decoration:none;font-weight:600;transition:color .2s}
  .footer a:hover{color:#b0b0e0}
  .guide-section{margin:12px;border:1px solid #333366;border-radius:8px;overflow:hidden}
  .guide-section summary{padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;color:#b0b0e0;list-style:none;display:flex;align-items:center;gap:6px;background:#1e1e44;transition:background .2s}
  .guide-section summary:hover{background:#2a2a5a}
  .guide-section[open] summary{background:#2a2a5a;border-bottom:1px solid #333366}
  .guide-content{padding:12px 14px;font-size:12px;color:#8888bb;line-height:1.8}
  .guide-content ol{padding-left:20px}.guide-content li{margin-bottom:4px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <a href="https://teemozipsa.github.io/" class="back-btn">← 도구 모음</a>
    <h1>📷 QR 코드 생성기</h1>
  </div>
  <div class="body">
    <textarea id="qrInput" placeholder="URL, 텍스트, 연락처 등을 입력하세요...&#10;예: https://teemozipsa.github.io/" oninput="generate()"></textarea>
    <div class="size-row">
      <label>QR 크기:</label>
      <select id="qrSize" onchange="generate()">
        <option value="4">작게 (132px)</option>
        <option value="6" selected>보통 (198px)</option>
        <option value="8">크게 (264px)</option>
        <option value="12">매우 크게 (396px)</option>
      </select>
    </div>
    <div class="qr-box" id="qrBox"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="downloadQR()">📥 PNG 다운로드</button>
      <button class="btn btn-secondary" onclick="copyQR()">📋 클립보드 복사</button>
    </div>
  </div>
  <details class="guide-section">
    <summary>📖 사용 방법</summary>
    <div class="guide-content">
      <ol>
        <li>텍스트 입력란에 URL, 텍스트, 연락처 등 원하는 내용을 입력하세요.</li>
        <li>QR 코드가 실시간으로 생성됩니다.</li>
        <li>생성된 QR 코드를 이미지로 다운로드할 수 있습니다.</li>
      </ol>
    </div>
  </details>
  <div class="footer">
    <span>입력 즉시 QR 코드 생성</span>
    <a href="https://teemozipsa.github.io/">😺 더 많은 도구</a>
  </div>
</div>
<script>
let currentDataUrl = '';
function generate() {
  const text = document.getElementById('qrInput').value.trim();
  const box = document.getElementById('qrBox');
  if (!text) { box.style.display = 'none'; return; }
  const cellSize = parseInt(document.getElementById('qrSize').value);
  try {
    const qr = qrcode(0, 'M');
    qr.addData(text);
    qr.make();
    const size = qr.getModuleCount() * cellSize;
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, size, size);
    for (let r = 0; r < qr.getModuleCount(); r++) {
      for (let c = 0; c < qr.getModuleCount(); c++) {
        if (qr.isDark(r, c)) {
          ctx.fillStyle = '#1a1a2e';
          ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
        }
      }
    }
    box.innerHTML = '';
    box.appendChild(canvas);
    box.style.display = 'block';
    currentDataUrl = canvas.toDataURL('image/png');
  } catch(e) {
    box.innerHTML = '<p style="color:#f87171;font-size:12px">텍스트가 너무 길거나 인코딩할 수 없습니다.</p>';
    box.style.display = 'block';
  }
}
function downloadQR() {
  if (!currentDataUrl) return;
  const a = document.createElement('a');
  a.href = currentDataUrl;
  a.download = 'qrcode.png';
  a.click();
}
async function copyQR() {
  if (!currentDataUrl) return;
  try {
    const res = await fetch(currentDataUrl);
    const blob = await res.blob();
    await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
    alert('QR 코드가 클립보드에 복사되었습니다!');
  } catch(e) { alert('복사 실패: 브라우저가 지원하지 않습니다.'); }
}
</script>
</body>
</html>
