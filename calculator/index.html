<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧮 일반 계산기 — 티모집사</title>
<meta name="description" content="사칙연산, 퍼센트, 부호 변환 등 기본 계산기. 키보드 입력 지원.">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #0f0f23;
    color: #e0e0f0;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 20px;
  }
  .calc-app {
    background: #16213e;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    width: 340px;
    max-width: 100%;
    overflow: hidden;
  }

  /* 타이틀바 */
  .calc-header {
    background: linear-gradient(135deg, #0f3460, #533483);
    padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .calc-header .back-btn {
    background: rgba(255,255,255,0.12); border: none; color: #ddd;
    font-size: 12px; cursor: pointer; padding: 5px 10px;
    border-radius: 6px; text-decoration: none;
    transition: background 0.2s; font-family: inherit;
    display: flex; align-items: center; gap: 4px;
  }
  .calc-header .back-btn:hover { background: rgba(255,255,255,0.22); color: #fff; }
  .calc-header h1 {
    font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 0.5px;
  }

  /* 디스플레이 */
  .calc-display {
    background: #1a1a3e;
    padding: 16px 20px;
    text-align: right;
    border-bottom: 1px solid #2a2a5a;
  }
  .calc-expr {
    font-size: 13px; color: #6666aa; min-height: 18px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .calc-result {
    font-size: 36px; font-weight: 700; color: #fff;
    margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }

  /* 버튼 그리드 */
  .calc-buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    padding: 1px;
    background: #1a1a3e;
  }
  .calc-btn {
    background: #222250;
    border: none;
    color: #e0e0f0;
    font-size: 20px;
    font-weight: 500;
    padding: 18px;
    cursor: pointer;
    transition: background 0.12s;
    font-family: inherit;
    user-select: none;
  }
  .calc-btn:hover { background: #2a2a6a; }
  .calc-btn:active { background: #3a3a7a; }

  .calc-btn.op {
    background: #2a2a5a;
    color: #b0b0e0;
    font-size: 22px;
  }
  .calc-btn.op:hover { background: #3a3a6a; }

  .calc-btn.fn {
    background: #1e1e3a;
    color: #8888bb;
    font-size: 16px;
  }
  .calc-btn.fn:hover { background: #2a2a4a; }

  .calc-btn.eq {
    background: #533483;
    color: #fff;
    font-size: 24px;
    font-weight: 700;
  }
  .calc-btn.eq:hover { background: #6b44a3; }
  .calc-btn.eq:active { background: #7b52b9; }

  .calc-btn.zero { grid-column: span 2; }

  /* 하단 */
  .calc-footer {
    background: #1a1a3e;
    padding: 10px 16px;
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid #2a2a5a;
    font-size: 11px; color: #6666aa;
  }
  .calc-footer a {
    color: #8888bb; text-decoration: none; font-weight: 600;
    transition: color 0.2s;
  }
  .calc-footer a:hover { color: #b0b0e0; }
</style>
</head>
<body>

<div class="calc-app">
  <div class="calc-header">
    <a href="https://teemozipsa.github.io/" class="back-btn">← 도구 모음</a>
    <h1>🧮 계산기</h1>
  </div>

  <div class="calc-display">
    <div class="calc-expr" id="expr"></div>
    <div class="calc-result" id="result">0</div>
  </div>

  <div class="calc-buttons">
    <button class="calc-btn fn" onclick="clearAll()">C</button>
    <button class="calc-btn fn" onclick="toggleSign()">±</button>
    <button class="calc-btn fn" onclick="percent()">%</button>
    <button class="calc-btn op" onclick="inputOp('÷')">÷</button>

    <button class="calc-btn" onclick="inputNum('7')">7</button>
    <button class="calc-btn" onclick="inputNum('8')">8</button>
    <button class="calc-btn" onclick="inputNum('9')">9</button>
    <button class="calc-btn op" onclick="inputOp('×')">×</button>

    <button class="calc-btn" onclick="inputNum('4')">4</button>
    <button class="calc-btn" onclick="inputNum('5')">5</button>
    <button class="calc-btn" onclick="inputNum('6')">6</button>
    <button class="calc-btn op" onclick="inputOp('−')">−</button>

    <button class="calc-btn" onclick="inputNum('1')">1</button>
    <button class="calc-btn" onclick="inputNum('2')">2</button>
    <button class="calc-btn" onclick="inputNum('3')">3</button>
    <button class="calc-btn op" onclick="inputOp('+')">+</button>

    <button class="calc-btn zero" onclick="inputNum('0')">0</button>
    <button class="calc-btn" onclick="inputDot()">.</button>
    <button class="calc-btn eq" onclick="calculate()">=</button>
  </div>

  <div class="calc-footer">
    <span>키보드 입력 지원</span>
    <a href="https://teemozipsa.github.io/">😺 더 많은 도구</a>
  </div>
</div>

<script>
let currentInput = '0';
let previousInput = '';
let operator = '';
let shouldResetDisplay = false;
let expression = '';

const resultEl = document.getElementById('result');
const exprEl = document.getElementById('expr');

function updateDisplay() {
  resultEl.textContent = currentInput;
  exprEl.textContent = expression;
}

function inputNum(n) {
  if (shouldResetDisplay) {
    currentInput = '';
    shouldResetDisplay = false;
  }
  if (currentInput === '0' && n !== '.') {
    currentInput = n;
  } else {
    if (currentInput.length >= 15) return;
    currentInput += n;
  }
  updateDisplay();
}

function inputDot() {
  if (shouldResetDisplay) {
    currentInput = '0';
    shouldResetDisplay = false;
  }
  if (!currentInput.includes('.')) {
    currentInput += '.';
  }
  updateDisplay();
}

function inputOp(op) {
  if (operator && !shouldResetDisplay) {
    calculate();
  }
  previousInput = currentInput;
  operator = op;
  expression = formatNum(previousInput) + ' ' + op;
  shouldResetDisplay = true;
  updateDisplay();
}

function calculate() {
  if (!operator || !previousInput) return;
  const a = parseFloat(previousInput);
  const b = parseFloat(currentInput);
  let result;

  switch (operator) {
    case '+': result = a + b; break;
    case '−': result = a - b; break;
    case '×': result = a * b; break;
    case '÷': result = b === 0 ? 'Error' : a / b; break;
    default: return;
  }

  expression = formatNum(previousInput) + ' ' + operator + ' ' + formatNum(currentInput) + ' =';

  if (result === 'Error') {
    currentInput = 'Error';
  } else {
    // 부동소수점 보정
    result = parseFloat(result.toPrecision(12));
    currentInput = String(result);
  }

  operator = '';
  previousInput = '';
  shouldResetDisplay = true;
  updateDisplay();
}

function clearAll() {
  currentInput = '0';
  previousInput = '';
  operator = '';
  expression = '';
  shouldResetDisplay = false;
  updateDisplay();
}

function toggleSign() {
  if (currentInput === '0' || currentInput === 'Error') return;
  if (currentInput.startsWith('-')) {
    currentInput = currentInput.slice(1);
  } else {
    currentInput = '-' + currentInput;
  }
  updateDisplay();
}

function percent() {
  const v = parseFloat(currentInput);
  if (isNaN(v)) return;
  currentInput = String(parseFloat((v / 100).toPrecision(12)));
  updateDisplay();
}

function formatNum(n) {
  const num = parseFloat(n);
  if (isNaN(num)) return n;
  if (Number.isInteger(num) && Math.abs(num) < 1e15) {
    return num.toLocaleString('ko-KR');
  }
  return n;
}

// 키보드 입력
document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') inputNum(e.key);
  else if (e.key === '.') inputDot();
  else if (e.key === '+') inputOp('+');
  else if (e.key === '-') inputOp('−');
  else if (e.key === '*') inputOp('×');
  else if (e.key === '/') { e.preventDefault(); inputOp('÷'); }
  else if (e.key === 'Enter' || e.key === '=') { e.preventDefault(); calculate(); }
  else if (e.key === 'Escape') clearAll();
  else if (e.key === 'Backspace') {
    if (currentInput.length > 1) {
      currentInput = currentInput.slice(0, -1);
    } else {
      currentInput = '0';
    }
    updateDisplay();
  }
  else if (e.key === '%') percent();
});

updateDisplay();
</script>

</body>
</html>
