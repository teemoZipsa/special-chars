<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg-body);color:var(--text-primary);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px}
.app{background:var(--bg-app);border-radius:12px;box-shadow:var(--shadow-lg);width:600px;max-width:100%;overflow:hidden}
.header{background:var(--bg-header);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:15px;font-weight:600;color:#fff}
.back-btn{background:rgba(255,255,255,.15);border:none;color:rgba(255,255,255,.9);font-size:12px;cursor:pointer;padding:5px 10px;border-radius:6px;text-decoration:none;transition:background .2s;font-family:inherit;display:flex;align-items:center;gap:4px}
.back-btn:hover{background:rgba(255,255,255,.25);color:#fff}
.body{padding:16px;display:flex;flex-direction:column;gap:14px}

.input-group{display:flex;flex-direction:column;gap:4px}
.input-group label{font-size:12px;color:var(--text-info);font-weight:600}
.input-row{display:flex;align-items:center;gap:8px}
.input-row input,.input-row select{flex:1;padding:10px 12px;background:var(--bg-guide);border:1.5px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:15px;font-family:inherit;font-weight:600;outline:none;transition:border-color .2s}
.input-row input:focus,.input-row select:focus{border-color:var(--accent)}
.input-row .unit{font-size:13px;color:var(--text-info);font-weight:600;white-space:nowrap;min-width:24px}

.tabs{display:flex;gap:4px;background:var(--bg-bar);border-radius:10px;padding:4px}
.tab{flex:1;padding:10px 6px;border:none;border-radius:8px;background:transparent;color:var(--text-info);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;text-align:center;line-height:1.2}
.tab.active{background:var(--accent);color:var(--text-on-accent);box-shadow:0 2px 8px rgba(83,52,131,.3)}
.tab:hover:not(.active){background:var(--bg-btn)}

.summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.summary-card{background:var(--accent-bg);border:1.5px solid var(--accent);border-radius:10px;padding:14px 10px;text-align:center}
.summary-card.highlight{background:var(--accent);border-color:var(--accent)}
.summary-card.highlight .s-value{color:var(--text-on-accent)}
.summary-card.highlight .s-label{color:rgba(255,255,255,.8)}
.s-label{font-size:11px;color:var(--text-info);margin-bottom:4px}
.s-value{font-size:20px;font-weight:800;color:var(--accent)}
.s-sub{font-size:11px;color:var(--text-info);margin-top:2px}

.schedule-toggle{width:100%;padding:10px;background:var(--bg-btn);border:1px solid var(--border);border-radius:8px;color:var(--text-secondary);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;text-align:center}
.schedule-toggle:hover{background:var(--bg-btn-hover)}

.schedule-wrap{max-height:0;overflow:hidden;transition:max-height .4s ease}
.schedule-wrap.open{max-height:9999px}
.schedule{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.schedule th{background:var(--bg-btn);padding:8px 6px;color:var(--text-info);font-weight:600;text-align:right;position:sticky;top:0}
.schedule th:first-child{text-align:center}
.schedule td{padding:7px 6px;border-bottom:1px solid var(--border);text-align:right;font-variant-numeric:tabular-nums;color:var(--text-secondary)}
.schedule td:first-child{text-align:center;color:var(--text-info)}
.schedule tr:last-child td{font-weight:700;color:var(--accent);border-top:2px solid var(--accent)}
.schedule-scroll{max-height:400px;overflow-y:auto}
.schedule-scroll::-webkit-scrollbar{width:4px}
.schedule-scroll::-webkit-scrollbar-thumb{background:var(--bg-btn-hover);border-radius:2px}

.compare{background:var(--bg-guide);border-radius:10px;padding:14px;font-size:12px;color:var(--text-info);line-height:1.6}
.compare strong{color:var(--text-primary)}
.compare .diff{color:var(--accent);font-weight:700}

.guide-section{margin:0 12px 12px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.guide-section summary{padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-guide);list-style:none;display:flex;align-items:center;gap:6px;background:var(--bg-guide);transition:background .2s}
.guide-section summary:hover{background:var(--bg-guide-hover)}
.guide-section[open] summary{background:var(--bg-btn);border-bottom:1px solid var(--border)}
.guide-content{padding:12px 14px;font-size:12px;color:var(--text-info);line-height:1.8}

.footer{background:var(--bg-bar);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);font-size:11px;color:var(--text-info)}
.footer a{color:var(--text-info);text-decoration:none;font-weight:600;transition:color .2s}
.footer a:hover{color:var(--text-secondary)}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:var(--text-on-accent);padding:10px 24px;border-radius:24px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(83,52,131,.4);opacity:0;transition:transform .3s,opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.scroll-top-btn{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--accent);color:var(--text-on-accent);border:none;font-size:20px;font-weight:700;cursor:pointer;z-index:900;box-shadow:0 2px 12px rgba(83,52,131,.5);opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s,transform .2s}
.scroll-top-btn.visible{opacity:1;visibility:visible}
.scroll-top-btn:hover{transform:scale(1.1);background:var(--accent-hover)}
@media(max-width:640px){
  .scroll-top-btn{bottom:70px;right:16px;width:40px;height:40px;font-size:18px}
  .summary{grid-template-columns:1fr}
  .s-value{font-size:18px}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <a href="https://teemozipsa.github.io/" class="back-btn">← 도구 모음</a>
    <h1>🏦 대출이자 계산기</h1>
  </div>
  <div class="body">
    <div class="input-group">
      <label>대출 금액</label>
      <div class="input-row">
        <input type="number" id="principal" value="100000000" min="0" step="10000000" oninput="calc()">
        <span class="unit">원</span>
      </div>
    </div>
    <div class="input-group">
      <label>연 이자율</label>
      <div class="input-row">
        <input type="number" id="rate" value="4.5" min="0" max="30" step="0.1" oninput="calc()">
        <span class="unit">%</span>
      </div>
    </div>
    <div class="input-group">
      <label>대출 기간</label>
      <div class="input-row">
        <input type="number" id="years" value="30" min="1" max="50" step="1" oninput="calc()">
        <span class="unit">년</span>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="setMethod(0)">원리금균등</button>
      <button class="tab" onclick="setMethod(1)">원금균등</button>
      <button class="tab" onclick="setMethod(2)">만기일시</button>
    </div>

    <div class="summary" id="summary"></div>
    <div class="compare" id="compare"></div>

    <button class="schedule-toggle" id="scheduleBtn" onclick="toggleSchedule()">📋 월별 상환 스케줄 보기</button>
    <div class="schedule-wrap" id="scheduleWrap">
      <div class="schedule-scroll">
        <table class="schedule" id="scheduleTable"></table>
      </div>
    </div>
  </div>

  <details class="guide-section">
    <summary>📖 상환 방식 안내</summary>
    <div class="guide-content">
      <p><b>원리금균등상환</b> — 매월 동일한 금액(원금+이자)을 납입. 계획 세우기 쉬움. 총 이자가 가장 많음.</p>
      <p><b>원금균등상환</b> — 매월 동일한 원금 + 줄어드는 이자 납입. 초기 부담 크지만 총 이자가 적음.</p>
      <p><b>만기일시상환</b> — 매월 이자만 납입, 만기에 원금 일시 상환. 총 이자가 가장 많음.</p>
      <br>
      <p>💡 같은 조건이면 <b>원금균등</b>이 총 이자가 가장 적습니다.</p>
    </div>
  </details>

    <div class="footer"><span>실시간 계산 · 이자 비교</span><a href="https://teemozipsa.github.io/">😺 더 많은 도구</a></div>
</div>

<div class="toast" id="toast"></div>
<button class="scroll-top-btn" aria-label="맨 위로">↑</button>

<script>
let method = 0; // 0=원리금균등, 1=원금균등, 2=만기일시
let scheduleOpen = false;

function setMethod(m) {
  method = m;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===m));
  calc();
}

function fmt(n) { return Math.round(n).toLocaleString('ko-KR'); }

function calc() {
  const P = parseFloat(document.getElementById('principal').value) || 0;
  const annualRate = parseFloat(document.getElementById('rate').value) || 0;
  const years = parseInt(document.getElementById('years').value) || 0;
  const months = years * 12;
  const r = annualRate / 100 / 12; // monthly rate

  if (P <= 0 || annualRate <= 0 || months <= 0) {
    document.getElementById('summary').innerHTML = '';
    document.getElementById('compare').innerHTML = '';
    document.getElementById('scheduleTable').innerHTML = '';
    return;
  }

  let schedule = [];
  let totalInterest = 0;
  let monthlyFirst = 0;

  if (method === 0) {
    // 원리금균등
    const monthly = P * r * Math.pow(1+r, months) / (Math.pow(1+r, months) - 1);
    let remaining = P;
    for (let i = 1; i <= months; i++) {
      const interest = remaining * r;
      const principal = monthly - interest;
      remaining -= principal;
      totalInterest += interest;
      schedule.push({ month: i, payment: monthly, principal, interest, remaining: Math.max(0, remaining) });
    }
    monthlyFirst = monthly;
  } else if (method === 1) {
    // 원금균등
    const monthlyPrincipal = P / months;
    let remaining = P;
    for (let i = 1; i <= months; i++) {
      const interest = remaining * r;
      const payment = monthlyPrincipal + interest;
      remaining -= monthlyPrincipal;
      totalInterest += interest;
      schedule.push({ month: i, payment, principal: monthlyPrincipal, interest, remaining: Math.max(0, remaining) });
    }
    monthlyFirst = schedule[0].payment;
  } else {
    // 만기일시
    const monthlyInterest = P * r;
    for (let i = 1; i <= months; i++) {
      const isLast = i === months;
      totalInterest += monthlyInterest;
      schedule.push({
        month: i,
        payment: isLast ? monthlyInterest + P : monthlyInterest,
        principal: isLast ? P : 0,
        interest: monthlyInterest,
        remaining: isLast ? 0 : P
      });
    }
    monthlyFirst = monthlyInterest;
  }

  const totalPayment = P + totalInterest;
  const methodNames = ['원리금균등', '원금균등', '만기일시'];

  // Summary cards
  document.getElementById('summary').innerHTML = `
    <div class="summary-card highlight">
      <div class="s-label">${method === 0 ? '월 납입금' : '첫 달 납입금'}</div>
      <div class="s-value">${fmt(monthlyFirst)}</div>
      <div class="s-sub">원</div>
    </div>
    <div class="summary-card">
      <div class="s-label">총 이자</div>
      <div class="s-value">${fmt(totalInterest)}</div>
      <div class="s-sub">원</div>
    </div>
    <div class="summary-card">
      <div class="s-label">총 상환금</div>
      <div class="s-value">${fmt(totalPayment)}</div>
      <div class="s-sub">원금 + 이자</div>
    </div>
  `;

  // Compare
  const allInterests = calcAllInterests(P, r, months);
  const diffs = allInterests.map((v,i) => ({name: methodNames[i], interest: v}));
  diffs.sort((a,b) => a.interest - b.interest);
  const best = diffs[0], worst = diffs[diffs.length-1];
  const saving = worst.interest - best.interest;
  document.getElementById('compare').innerHTML = saving > 0 ?
    `💡 상환 방식 비교: <strong>${best.name}</strong>이 <strong>${worst.name}</strong>보다 이자 <span class="diff">${fmt(saving)}원 절약</span>` : '';

  // Schedule table
  renderSchedule(schedule);
}

function calcAllInterests(P, r, months) {
  // 원리금균등
  const m0 = P * r * Math.pow(1+r,months)/(Math.pow(1+r,months)-1);
  const ti0 = m0 * months - P;
  // 원금균등
  const mp = P / months;
  let ti1 = 0, rem = P;
  for(let i=0;i<months;i++){ ti1 += rem*r; rem -= mp; }
  // 만기일시
  const ti2 = P * r * months;
  return [ti0, ti1, ti2];
}

function renderSchedule(schedule) {
  const table = document.getElementById('scheduleTable');
  let html = `<thead><tr><th>회차</th><th>납입금</th><th>원금</th><th>이자</th><th>잔액</th></tr></thead><tbody>`;
  
  let totalPayment=0, totalPrincipal=0, totalInterest=0;
  schedule.forEach(s => {
    totalPayment += s.payment;
    totalPrincipal += s.principal;
    totalInterest += s.interest;
    // Show every month for short loans, every 12th for long loans
    const show = schedule.length <= 60 || s.month % 12 === 1 || s.month === schedule.length;
    if (show) {
      html += `<tr>
        <td>${s.month}</td>
        <td>${fmt(s.payment)}</td>
        <td>${fmt(s.principal)}</td>
        <td>${fmt(s.interest)}</td>
        <td>${fmt(s.remaining)}</td>
      </tr>`;
    }
  });
  html += `<tr>
    <td>합계</td>
    <td>${fmt(totalPayment)}</td>
    <td>${fmt(totalPrincipal)}</td>
    <td>${fmt(totalInterest)}</td>
    <td>0</td>
  </tr>`;
  html += '</tbody>';
  table.innerHTML = html;
}

function toggleSchedule() {
  scheduleOpen = !scheduleOpen;
  document.getElementById('scheduleWrap').classList.toggle('open', scheduleOpen);
  document.getElementById('scheduleBtn').textContent = scheduleOpen ? '📋 스케줄 접기' : '📋 월별 상환 스케줄 보기';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

calc();

(function(){var b=document.querySelector('.scroll-top-btn');if(!b)return;window.addEventListener('scroll',function(){b.classList.toggle('visible',window.scrollY>200)});b.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'})})})();
</script>
<script src="/special-chars/theme-toggle.js"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/special-chars/sw.js').catch(function(){})}</script>
</body>
