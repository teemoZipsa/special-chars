<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/special-chars/favicon.png">
    <title>타임존 변환기 / Timezone Converter</title>
    <meta name="description" content="세계 주요 도시의 시간을 실시간 변환합니다. 서머타임 자동 반영, 시차 확인">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3501868770820650" crossorigin="anonymous"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Pretendard',-apple-system,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;justify-content:center;padding:20px}
        .app{background:#16213e;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.4);width:720px;max-width:100%;overflow:hidden;display:flex;flex-direction:column}
        .header{background:linear-gradient(135deg,#0f3460,#533483);padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
        .header h1{font-size:16px;font-weight:600;color:#fff;letter-spacing:1px}
        .back-btn{background:rgba(255,255,255,.12);border:none;color:#ddd;font-size:12px;cursor:pointer;padding:5px 10px;border-radius:6px;text-decoration:none;transition:background .2s;white-space:nowrap;display:flex;align-items:center;gap:4px;font-family:inherit}
        .back-btn:hover{background:rgba(255,255,255,.22);color:#fff}
        .counter-body{padding:16px;flex:1}

        .tz-card{background:#1e1e44;border-radius:10px;padding:16px;margin-bottom:12px}
        .tz-label{font-size:11px;color:#8888bb;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
        .tz-select{width:100%;padding:10px 12px;background:#2a2a5a;border:1px solid #3a3a6a;border-radius:8px;color:#e0e0ff;font-size:14px;font-family:inherit;margin-bottom:10px;cursor:pointer}
        .tz-select:focus{outline:none;border-color:#533483}
        .tz-datetime{display:flex;gap:8px}
        .tz-datetime input{flex:1;padding:10px 12px;background:#2a2a5a;border:1px solid #3a3a6a;border-radius:8px;color:#e0e0ff;font-size:14px;font-family:inherit}
        .tz-datetime input:focus{outline:none;border-color:#533483}
        .tz-result{font-size:28px;font-weight:700;color:#fff;text-align:center;padding:8px 0}
        .tz-result-date{font-size:13px;color:#b0b0e0;text-align:center;margin-top:2px}
        .tz-result-info{font-size:11px;color:#8888bb;text-align:center;margin-top:4px}

        .swap-row{display:flex;justify-content:center;gap:10px;margin-bottom:12px}
        .btn-swap{padding:10px 20px;background:#222250;color:#b0b0e0;border:1px solid #333366;border-radius:8px;font-size:13px;cursor:pointer;transition:all .2s;font-family:inherit;font-weight:600}
        .btn-swap:hover{background:#2a2a5a;border-color:#533483;color:#e0e0ff}
        .btn-now{padding:10px 20px;background:#533483;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s;font-family:inherit}
        .btn-now:hover{background:#6b44a3}

        .diff-banner{text-align:center;padding:12px;background:#222250;border-radius:10px;margin-bottom:12px;border:1px solid #333366}
        .diff-text{font-size:14px;color:#e0e0ff;font-weight:600}
        .diff-sub{font-size:11px;color:#8888bb;margin-top:2px}

        .guide-section{margin:12px;border:1px solid #333366;border-radius:8px;overflow:hidden}
        .guide-section summary{padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;color:#b0b0e0;list-style:none;display:flex;align-items:center;gap:6px;background:#1e1e44;transition:background .2s}
        .guide-section summary:hover{background:#2a2a5a}
        .guide-section[open] summary{background:#2a2a5a;border-bottom:1px solid #333366}
        .guide-content{padding:12px 14px;font-size:12px;color:#8888bb;line-height:1.8}
        .guide-content ol{padding-left:20px}.guide-content li{margin-bottom:4px}

        .bottom-bar{background:#1a1a3e;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #2a2a5a}
        .bottom-bar .info{font-size:11px;color:#8888bb}
        .action-btn{padding:8px 20px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
        .btn-clear{background:#2a2a5a;color:#b0b0e0}.btn-clear:hover{background:#3a3a6a}
        .btn-copy{background:#533483;color:#fff}.btn-copy:hover{background:#6b44a3}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#533483;color:#fff;padding:10px 24px;border-radius:24px;font-size:14px;font-weight:500;box-shadow:0 4px 20px rgba(83,52,131,.6);transition:transform .3s ease,opacity .3s ease;opacity:0;pointer-events:none;z-index:999}
        .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
        @media(max-width:640px){.tz-datetime{flex-direction:column}}
.scroll-top-btn{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:#533483;color:#fff;border:none;font-size:20px;font-weight:700;cursor:pointer;z-index:900;box-shadow:0 2px 12px rgba(83,52,131,.5);opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s,transform .2s}
.scroll-top-btn.visible{opacity:1;visibility:visible}
.scroll-top-btn:hover{transform:scale(1.1);background:#6b44a3}
@media(max-width:640px){.scroll-top-btn{bottom:70px;right:16px;width:40px;height:40px;font-size:18px}}
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <a href="https://teemozipsa.github.io/" class="back-btn">← 도구 모음</a>
        <h1>🌍 타임존 변환기</h1>
    </div>
    <div class="counter-body">
        <!-- FROM -->
        <div class="tz-card">
            <div class="tz-label">🔵 기준 시간 (FROM)</div>
            <select class="tz-select" id="fromTz" onchange="convert()">
            </select>
            <div class="tz-datetime">
                <input type="date" id="fromDate" onchange="convert()">
                <input type="time" id="fromTime" step="60" onchange="convert()">
            </div>
        </div>

        <div class="swap-row">
            <button class="btn-now" onclick="setNow()">⏰ 현재 시간</button>
            <button class="btn-swap" onclick="swapTz()">↕ 전환</button>
        </div>

        <!-- TO -->
        <div class="tz-card">
            <div class="tz-label">🔴 변환 시간 (TO)</div>
            <select class="tz-select" id="toTz" onchange="convert()">
            </select>
            <div class="tz-result" id="toResult">--:--</div>
            <div class="tz-result-date" id="toResultDate"></div>
            <div class="tz-result-info" id="toResultInfo"></div>
        </div>

        <!-- Diff -->
        <div class="diff-banner" id="diffBanner" style="display:none">
            <div class="diff-text" id="diffText"></div>
            <div class="diff-sub" id="diffSub"></div>
        </div>
    </div>

    <details class="guide-section">
        <summary>📖 사용 방법</summary>
        <div class="guide-content">
            <ol>
                <li>'현재 시간' 버튼을 누르거나 날짜/시간을 직접 입력하세요</li>
                <li>FROM(기준)과 TO(변환) 타임존을 각각 선택하세요</li>
                <li>자동으로 변환된 시간과 시차가 표시됩니다</li>
                <li>'↕ 전환' 버튼으로 FROM/TO를 쉽게 바꿀 수 있습니다</li>
            </ol>
            <p style="margin-top:8px">💡 서머타임(DST)은 브라우저의 IANA 타임존 DB를 사용하여 자동 반영됩니다.</p>
        </div>
    </details>

    <div class="bottom-bar">
        <div class="info">서머타임 자동 반영</div>
        <div style="display:flex;gap:8px">
            <button class="action-btn btn-clear" onclick="resetAll()">초기화</button>
            <button class="action-btn btn-copy" onclick="copyResult()">결과 복사</button>
        </div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
const TIMEZONES = [
    { id:'Asia/Seoul', label:'🇰🇷 서울', abbr:'KST' },
    { id:'Asia/Tokyo', label:'🇯🇵 도쿄', abbr:'JST' },
    { id:'Asia/Shanghai', label:'🇨🇳 베이징/상하이', abbr:'CST' },
    { id:'Asia/Taipei', label:'🇹🇼 타이베이', abbr:'CST' },
    { id:'Asia/Hong_Kong', label:'🇭🇰 홍콩', abbr:'HKT' },
    { id:'Asia/Singapore', label:'🇸🇬 싱가포르', abbr:'SGT' },
    { id:'Asia/Bangkok', label:'🇹🇭 방콕', abbr:'ICT' },
    { id:'Asia/Ho_Chi_Minh', label:'🇻🇳 호치민', abbr:'ICT' },
    { id:'Asia/Kolkata', label:'🇮🇳 뭄바이/델리', abbr:'IST' },
    { id:'Asia/Dubai', label:'🇦🇪 두바이', abbr:'GST' },
    { id:'Australia/Sydney', label:'🇦🇺 시드니', abbr:'AEST/AEDT' },
    { id:'Pacific/Auckland', label:'🇳🇿 오클랜드', abbr:'NZST/NZDT' },
    { id:'Europe/London', label:'🇬🇧 런던', abbr:'GMT/BST' },
    { id:'Europe/Paris', label:'🇫🇷 파리', abbr:'CET/CEST' },
    { id:'Europe/Berlin', label:'🇩🇪 베를린', abbr:'CET/CEST' },
    { id:'Europe/Moscow', label:'🇷🇺 모스크바', abbr:'MSK' },
    { id:'America/New_York', label:'🇺🇸 뉴욕', abbr:'EST/EDT' },
    { id:'America/Chicago', label:'🇺🇸 시카고', abbr:'CST/CDT' },
    { id:'America/Denver', label:'🇺🇸 덴버', abbr:'MST/MDT' },
    { id:'America/Los_Angeles', label:'🇺🇸 로스앤젤레스', abbr:'PST/PDT' },
    { id:'America/Anchorage', label:'🇺🇸 앵커리지', abbr:'AKST/AKDT' },
    { id:'Pacific/Honolulu', label:'🇺🇸 호놀룰루', abbr:'HST' },
    { id:'America/Sao_Paulo', label:'🇧🇷 상파울루', abbr:'BRT' }
];

function initSelects() {
    const fromSel = document.getElementById('fromTz');
    const toSel = document.getElementById('toTz');
    TIMEZONES.forEach((tz, i) => {
        const opt1 = new Option(`${tz.label} (${tz.abbr})`, tz.id);
        const opt2 = new Option(`${tz.label} (${tz.abbr})`, tz.id);
        fromSel.add(opt1);
        toSel.add(opt2);
    });
    fromSel.value = 'Asia/Seoul';
    toSel.value = 'America/New_York';
}

function setNow() {
    const now = new Date();
    const fromTz = document.getElementById('fromTz').value;
    const parts = getDateTimeInTz(now, fromTz);
    document.getElementById('fromDate').value = parts.date;
    document.getElementById('fromTime').value = parts.time;
    convert();
}

function getDateTimeInTz(date, tz) {
    const fmt = new Intl.DateTimeFormat('en-CA', { timeZone: tz, year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false });
    const parts = {};
    fmt.formatToParts(date).forEach(p => { parts[p.type] = p.value; });
    const h = parts.hour === '24' ? '00' : parts.hour;
    return { date: `${parts.year}-${parts.month}-${parts.day}`, time: `${h}:${parts.minute}` };
}

function convert() {
    const fromTz = document.getElementById('fromTz').value;
    const toTz = document.getElementById('toTz').value;
    const dateVal = document.getElementById('fromDate').value;
    const timeVal = document.getElementById('fromTime').value;

    if (!dateVal || !timeVal) {
        document.getElementById('toResult').textContent = '--:--';
        document.getElementById('toResultDate').textContent = '';
        document.getElementById('toResultInfo').textContent = '';
        document.getElementById('diffBanner').style.display = 'none';
        return;
    }

    // Create date in fromTz
    const fromStr = `${dateVal}T${timeVal}:00`;
    // Get UTC offset for fromTz at this date
    const tempDate = new Date(fromStr);
    const fromParts = getDateTimeInTz(tempDate, fromTz);
    const localParts = { date: dateVal, time: timeVal };

    // Calculate offset difference
    const fromOffset = getOffsetMinutes(tempDate, fromTz);
    const utcMs = tempDate.getTime() + (tempDate.getTimezoneOffset() * 60000) - (fromOffset * 60000) + (tempDate.getTimezoneOffset() * 60000);

    // Simpler approach: construct a UTC date from the "from" inputs
    const localDate = new Date(`${dateVal}T${timeVal}:00`);
    const fromOffsetMs = getOffsetMs(localDate, fromTz);
    const utcDate = new Date(localDate.getTime() - fromOffsetMs);
    const toOffsetMs = getOffsetMs(utcDate, toTz);
    const toDate = new Date(utcDate.getTime() + toOffsetMs);

    const toParts = getDateTimeInTz(toDate, toTz);

    // Display
    document.getElementById('toResult').textContent = toParts.time;

    const days = ['일','월','화','수','목','금','토'];
    const toD = new Date(toParts.date);
    const dayName = days[toD.getDay()];
    document.getElementById('toResultDate').textContent = `${toParts.date} (${dayName})`;

    // DST info
    const toTzInfo = TIMEZONES.find(t => t.id === toTz);
    document.getElementById('toResultInfo').textContent = toTzInfo ? toTzInfo.label : '';

    // Diff
    const diffMin = Math.round((toOffsetMs - fromOffsetMs) / 60000);
    const diffH = diffMin / 60;
    const fromInfo = TIMEZONES.find(t => t.id === fromTz);
    const absDiffH = Math.abs(diffH);
    const diffLabel = diffH > 0 ? `${absDiffH}시간 빠름` : diffH < 0 ? `${absDiffH}시간 느림` : '같은 시간대';
    document.getElementById('diffText').textContent = `시차: ${diffH >= 0 ? '+' : ''}${diffH}시간`;
    document.getElementById('diffSub').textContent = `${fromInfo ? fromInfo.label : fromTz} 기준 ${diffLabel}`;
    document.getElementById('diffBanner').style.display = 'block';
}

function getOffsetMs(date, tz) {
    const utcStr = date.toLocaleString('en-US', { timeZone: 'UTC' });
    const tzStr = date.toLocaleString('en-US', { timeZone: tz });
    return new Date(tzStr).getTime() - new Date(utcStr).getTime();
}

function getOffsetMinutes(date, tz) {
    return getOffsetMs(date, tz) / 60000;
}

function swapTz() {
    const fromSel = document.getElementById('fromTz');
    const toSel = document.getElementById('toTz');
    const tmp = fromSel.value;
    fromSel.value = toSel.value;
    toSel.value = tmp;
    convert();
    showToast('타임존이 전환되었습니다');
}

function resetAll() {
    document.getElementById('fromDate').value = '';
    document.getElementById('fromTime').value = '';
    document.getElementById('fromTz').value = 'Asia/Seoul';
    document.getElementById('toTz').value = 'America/New_York';
    document.getElementById('toResult').textContent = '--:--';
    document.getElementById('toResultDate').textContent = '';
    document.getElementById('toResultInfo').textContent = '';
    document.getElementById('diffBanner').style.display = 'none';
    showToast('초기화되었습니다');
}

function copyResult() {
    const result = document.getElementById('toResult').textContent;
    if (result === '--:--') { showToast('먼저 시간을 입력하세요'); return; }
    const fromTz = TIMEZONES.find(t => t.id === document.getElementById('fromTz').value);
    const toTz = TIMEZONES.find(t => t.id === document.getElementById('toTz').value);
    const fromDate = document.getElementById('fromDate').value;
    const fromTime = document.getElementById('fromTime').value;
    const toResultDate = document.getElementById('toResultDate').textContent;
    const diff = document.getElementById('diffText').textContent;
    const text = `${fromTz ? fromTz.label : ''} ${fromDate} ${fromTime}\n→ ${toTz ? toTz.label : ''} ${toResultDate} ${result}\n${diff}`;
    navigator.clipboard.writeText(text).then(() => showToast('결과가 복사되었습니다'));
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1500);
}

initSelects();
</script>
<button class="scroll-top-btn" aria-label="맨 위로">↑</button>
<script>(function(){var b=document.querySelector('.scroll-top-btn');if(!b)return;window.addEventListener('scroll',function(){b.classList.toggle('visible',window.scrollY>200)});b.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'})})})();</script>
</body>
</html>
