  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg-body);
    color: var(--text-primary);
    display: flex;
    justify-content: center;
    align-items: start;
    min-height: 100vh;
    padding: 20px;
  }
  .app {
    background: var(--bg-app);
    border-radius: 12px;
    box-shadow: var(--shadow-lg);
    width: 720px;
    max-width: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: var(--bg-header);
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
    position: relative;
  }
  .header h1 { font-size: 15px; font-weight: 600; color: #fff; position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; }
  .header .search-box {
    display: flex; align-items: center;
    background: rgba(255,255,255,0.15);
    border-radius: 20px; padding: 4px 12px;
  }
  .header .search-box input {
    background: none; border: none; outline: none;
    color: #fff; font-size: 13px; width: 140px; padding: 2px 4px;
  }
  .header .search-box input::placeholder { color: rgba(255,255,255,0.5); }
  .header .search-box svg { width: 14px; height: 14px; fill: rgba(255,255,255,0.6); }

  .workspace-panel {
    background: var(--bg-bar); padding: 8px 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .recent-left { display: flex; align-items: center; gap: 8px; flex: 1; overflow: hidden; }
  .recent-label { font-size: 11px; color: var(--text-info); white-space: nowrap; flex-shrink: 0; font-weight: 600; }
  .recent-chars { display: flex; gap: 4px; flex-wrap: nowrap; overflow-x: auto; flex: 1; padding-bottom: 2px; }
  .recent-chars::-webkit-scrollbar { height: 4px; }
  .recent-chars::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .char-btn-small { 
    background: var(--bg-btn); border: 1px solid var(--border); flex-shrink:0; 
    width: 32px; height: 32px; font-size: 16px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-primary);
    transition: all 0.15s;
  }
  .char-btn-small:hover { background: var(--bg-btn-hover); transform: scale(1.1); box-shadow: var(--shadow-sm); z-index: 2; }
  .action-groups { display: flex; gap: 6px; flex-shrink: 0; }
  .action-btn {
    padding: 0 10px; height: 28px; border: none; border-radius: 6px;
    font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-accent { background: var(--accent); color: var(--text-on-accent); }
  .btn-accent:hover { background: var(--accent-hover); }
  .btn-clear { background: var(--btn-clear-bg); color: var(--btn-clear-text); }
  .btn-clear:hover { background: var(--btn-clear-hover); }

  /* 탭 그룹 */
  .tab-groups {
    background: var(--bg-bar);
    padding: 6px 10px 0;
  }
  .tab-group-label {
    font-size: 10px;
    color: var(--text-info);
    padding: 6px 4px 3px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
  }
  .tab-group-label:first-child { padding-top: 2px; }
  .tab-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding-bottom: 4px;
  }
  .tab-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2px 0;
  }
  .tab {
    padding: 7px 12px; font-size: 12px;
    border: none; background: var(--bg-tab); color: var(--text-tab);
    border-radius: 8px 8px 0 0; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .tab:hover { background: var(--bg-tab-hover); color: var(--text-primary); }
  .tab.active { background: var(--bg-tab-active); color: var(--text-tab-active); font-weight: 600; }
  .tab.emoji-tab { background: var(--bg-emoji-tab); }
  .tab.emoji-tab:hover { background: var(--bg-emoji-tab-hover); }
  .tab.emoji-tab.active { background: var(--bg-emoji-tab-active); color: var(--text-on-accent); }

  .grid-container {
    padding: 12px; height: 360px;
    overflow-y: auto; overflow-x: hidden;
  }
  .grid-container::-webkit-scrollbar { width: 6px; }
  .grid-container::-webkit-scrollbar-track { background: var(--scrollbar-track); }
  .grid-container::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
  .char-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(38px, 1fr));
    gap: 3px;
  }
  .char-grid.emoji-mode {
    grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
  }
  .char-btn {
    width: 100%; aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; background: var(--bg-char-btn);
    border: 1px solid var(--border-char); border-radius: 6px;
    color: var(--text-primary); cursor: pointer;
    transition: all 0.15s; user-select: none; position: relative;
  }
  .char-btn:hover {
    background: var(--bg-char-btn-hover); border-color: var(--border-hover);
    transform: scale(1.15); z-index: 2;
    box-shadow: var(--shadow-accent);
  }
  .char-btn:active { transform: scale(0.95); background: var(--accent-hover); }
  .char-btn.copied { background: #2ecc71 !important; border-color: #27ae60 !important; }
  .char-btn.emoji-cell {
    font-size: 24px; background: var(--bg-emoji-cell); border-color: var(--border-emoji);
  }
  .char-btn.emoji-cell:hover {
    background: var(--bg-emoji-hover); border-color: var(--border-emoji-hover);
    box-shadow: 0 4px 12px rgba(230,126,34,0.5);
  }

  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--toast-bg); color: var(--text-on-accent);
    padding: 10px 24px; border-radius: 24px;
    font-size: 14px; font-weight: 500;
    box-shadow: var(--shadow-accent);
    transition: transform 0.3s ease, opacity 0.3s ease;
    opacity: 0; pointer-events: none; z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }



  .sub-header {
    grid-column: 1 / -1; font-size: 11px; color: var(--text-info);
    padding: 8px 4px 4px; border-bottom: 1px solid var(--border); margin-bottom: 2px;
  }
  .sub-header:first-child { padding-top: 0; }

  /* 뒤로가기 버튼 */
  .back-btn {
    background: rgba(255,255,255,0.15); border: none; color: rgba(255,255,255,0.9);
    font-size: 12px; cursor: pointer; padding: 5px 10px;
    border-radius: 6px; text-decoration: none;
    transition: background 0.2s; white-space: nowrap;
    display: flex; align-items: center; gap: 4px;
    font-family: inherit;
  }
  .back-btn:hover { background: rgba(255,255,255,0.25); color: #fff; }


  .btn-copy { background: var(--btn-copy-bg); color: var(--btn-copy-text); }
  .btn-copy:hover { background: var(--btn-copy-hover); }

  .guide-section{margin:12px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .guide-section summary{padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-guide);list-style:none;display:flex;align-items:center;gap:6px;background:var(--bg-guide);transition:background .2s}
  .guide-section summary:hover{background:var(--bg-guide-hover)}
  .guide-section[open] summary{background:var(--bg-guide-hover);border-bottom:1px solid var(--border)}
  .guide-content{padding:12px 14px;font-size:12px;color:var(--text-info);line-height:1.8}
  .guide-content ol{padding-left:20px}.guide-content li{margin-bottom:4px}
.scroll-top-btn{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--accent);color:var(--text-on-accent);border:none;font-size:20px;font-weight:700;cursor:pointer;z-index:900;box-shadow:var(--shadow-accent);opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s,transform .2s}
.scroll-top-btn.visible{opacity:1;visibility:visible}
.scroll-top-btn:hover{transform:scale(1.1);background:var(--accent-hover)}
@media(max-width:640px){.scroll-top-btn{bottom:70px;right:16px;width:40px;height:40px;font-size:18px}}
  .footer{background:var(--bg-bar);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);font-size:11px;color:var(--text-info)}
  .footer a{color:var(--text-info);text-decoration:none;font-weight:600;transition:color .2s}
  .footer a:hover{color:var(--text-secondary)}
</style>

const SPECIAL_KEYS = Object.keys(SPECIAL);
const EMOJI_KEYS = Object.keys(EMOJI);

let currentTab = "기호";
let recentChars;
try { recentChars = JSON.parse(localStorage.getItem('recentChars') || '[]'); } catch { recentChars = []; }

// ZWJ 이모지, 국기 등 올바르게 분리
function splitChars(str) {
  if (Intl.Segmenter) {
    return [...new Intl.Segmenter().segment(str)].map(s => s.segment);
  }
  return [...str];
}

function isEmojiTab(name) {
  return EMOJI_KEYS.includes(name);
}

function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';
  // 특수문자 그룹
  const lbl1 = document.createElement('div');
  lbl1.className = 'tab-group-label';
  lbl1.textContent = '특수 문자';
  bar.appendChild(lbl1);
  const row1 = document.createElement('div');
  row1.className = 'tab-row';
  SPECIAL_KEYS.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (name === currentTab ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => { currentTab = name; renderTabs(); renderGrid(); };
    row1.appendChild(btn);
  });
  bar.appendChild(row1);
  // 구분선
  const hr = document.createElement('hr');
  hr.className = 'tab-divider';
  bar.appendChild(hr);
  // 이모지 그룹
  const lbl2 = document.createElement('div');
  lbl2.className = 'tab-group-label';
  lbl2.textContent = '이모지';
  bar.appendChild(lbl2);
  const row2 = document.createElement('div');
  row2.className = 'tab-row';
  EMOJI_KEYS.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'tab emoji-tab' + (name === currentTab ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => { currentTab = name; renderTabs(); renderGrid(); };
    row2.appendChild(btn);
  });
  bar.appendChild(row2);
}

function renderGrid(filter = '') {
  const grid = document.getElementById('charGrid');
  grid.innerHTML = '';
  const isEmoji = isEmojiTab(currentTab);
  grid.className = 'char-grid' + (isEmoji ? ' emoji-mode' : '');
  const cat = CATEGORIES[currentTab];
  for (const [subName, chars] of Object.entries(cat)) {
    const charArr = splitChars(chars);
    const filtered = filter
      ? charArr.filter(c => c.includes(filter) || subName.includes(filter) || ('U+' + c.codePointAt(0).toString(16).toUpperCase()).includes(filter.toUpperCase()))
      : charArr;
    if (filtered.length === 0) continue;
    const header = document.createElement('div');
    header.className = 'sub-header';
    header.textContent = subName;
    grid.appendChild(header);
    filtered.forEach(ch => {
      const btn = document.createElement('button');
      btn.className = 'char-btn' + (isEmoji ? ' emoji-cell' : '');
      btn.textContent = ch;
      btn.title = `${ch}  (U+${ch.codePointAt(0).toString(16).toUpperCase().padStart(4,'0')})`;
      btn.onmouseenter = () => {
        document.getElementById('codeInfo').textContent = 'U+' + ch.codePointAt(0).toString(16).toUpperCase().padStart(4,'0');
      };
      btn.onclick = () => copyChar(ch, btn);
      grid.appendChild(btn);
    });
  }
}

function copyChar(ch, btnEl) {
  navigator.clipboard.writeText(ch).then(() => {
    showToast(`'${ch}' 복사됨!`);
    
    if (btnEl) {
      btnEl.classList.add('copied');
      setTimeout(() => btnEl.classList.remove('copied'), 400);
    }
    addRecent(ch);
  });
}

function copyMultiInput() {
  if (recentChars.length === 0) return;
  const comboText = recentChars.join('');
  navigator.clipboard.writeText(comboText).then(() => {
    showToast(`전체 복사됨: ${comboText}`);
  });
}

function addRecent(ch) {
  recentChars = recentChars.filter(c => c !== ch);
  recentChars.unshift(ch);
  if (recentChars.length > 20) recentChars = recentChars.slice(0, 20);
  try { localStorage.setItem('recentChars', JSON.stringify(recentChars)); } catch {}
  renderRecent();
}

function renderRecent() {
  const container = document.getElementById('recentChars');
  container.innerHTML = '';
  recentChars.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'char-btn-small';
    btn.textContent = ch;
    btn.onclick = () => copyChar(ch, btn);
    btn.onmouseenter = () => {
      document.getElementById('codeInfo').textContent = 'U+' + ch.codePointAt(0).toString(16).toUpperCase().padStart(4,'0');
    };
    container.appendChild(btn);
  });
}

function clearRecent() {
  recentChars = [];
  try { localStorage.setItem('recentChars', JSON.stringify(recentChars)); } catch {}
  renderRecent();
  showToast('최근 사용 목록 삭제됨');
}

const CHOSUNG_LIST = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const JUNGSUNG_LIST = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
const JONGSUNG_LIST = ['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const KOR_TO_ENG = {
  'ㄱ':'r', 'ㄲ':'R', 'ㄴ':'s', 'ㄷ':'e', 'ㄸ':'E', 'ㄹ':'f', 'ㅁ':'a', 'ㅂ':'q', 'ㅃ':'Q', 'ㅅ':'t', 'ㅆ':'T', 'ㅇ':'d', 'ㅈ':'w', 'ㅉ':'W', 'ㅊ':'c', 'ㅋ':'z', 'ㅌ':'x', 'ㅍ':'v', 'ㅎ':'g',
  'ㅏ':'k', 'ㅐ':'o', 'ㅒ':'O', 'ㅑ':'i', 'ㅓ':'j', 'ㅔ':'p', 'ㅖ':'P', 'ㅕ':'u', 'ㅗ':'h', 'ㅘ':'hk', 'ㅙ':'ho', 'ㅚ':'hl', 'ㅛ':'y', 'ㅜ':'n', 'ㅝ':'nj', 'ㅞ':'np', 'ㅟ':'nl', 'ㅠ':'b', 'ㅡ':'m', 'ㅢ':'ml', 'ㅣ':'l'
};

function getChosung(text) {
  let result = '';
  for (let i = 0; i < text.length; i++) {
    const code = text.charCodeAt(i) - 44032;
    if (code >= 0 && code <= 11171) {
      result += CHOSUNG_LIST[Math.floor(code / 588)];
    } else {
      result += text.charAt(i);
    }
  }
  return result;
}

function korToEngTypo(text) {
  let res = '';
  for(let i=0; i<text.length; i++) {
    let code = text.charCodeAt(i) - 44032;
    if (code >= 0 && code <= 11171) {
      let cho = Math.floor(code / 588);
      let jung = Math.floor((code - (cho * 588)) / 28);
      let jong = code % 28;
      res += KOR_TO_ENG[CHOSUNG_LIST[cho]];
      res += KOR_TO_ENG[JUNGSUNG_LIST[jung]];
      if (jong > 0) {
        const jongChar = JONGSUNG_LIST[jong];
        const compositeMap = {
          'ㄳ':['ㄱ','ㅅ'],'ㄵ':['ㄴ','ㅈ'],'ㄶ':['ㄴ','ㅎ'],'ㄺ':['ㄹ','ㄱ'],'ㄻ':['ㄹ','ㅁ'],
          'ㄼ':['ㄹ','ㅂ'],'ㄽ':['ㄹ','ㅅ'],'ㄾ':['ㄹ','ㅌ'],'ㄿ':['ㄹ','ㅍ'],'ㅀ':['ㄹ','ㅎ'],'ㅄ':['ㅂ','ㅅ']
        };
        if(compositeMap[jongChar]) {
          res += KOR_TO_ENG[compositeMap[jongChar][0]] + KOR_TO_ENG[compositeMap[jongChar][1]];
        } else {
          res += KOR_TO_ENG[jongChar];
        }
      }
    } else {
      res += KOR_TO_ENG[text[i]] || text[i];
    }
  }
  return res;
}

const EXTENDED_KEYWORDS = [];
for (const [kw, chars] of Object.entries(SEARCH_KEYWORDS)) {
  EXTENDED_KEYWORDS.push({ kw: kw, cho: getChosung(kw), eng: korToEngTypo(kw), chars: chars });
}

function getKeywordMatches(query) {
  const q = query.toLowerCase();
  const matched = new Set();
  
  const isEngQuery = /^[a-zA-Z]+$/.test(q);
  const isChoQuery = /^[ㄱ-ㅎ]+$/.test(q);

  for (const item of EXTENDED_KEYWORDS) {
    let match = false;
    if (isEngQuery && item.eng.includes(q)) match = true;
    else if (isChoQuery && item.cho.includes(q)) match = true;
    else if (item.kw.includes(q) || q.includes(item.kw)) match = true;

    if (match) {
      splitChars(item.chars).forEach(c => matched.add(c));
    }
  }
  return matched;
}

function filterChars() {
  const q = document.getElementById('searchInput').value.trim();
  if (q) {
    const grid = document.getElementById('charGrid');
    grid.innerHTML = '';
    grid.className = 'char-grid';
    const kwMatches = getKeywordMatches(q);
    // 키워드 매칭 결과가 있으면 먼저 보여주기
    if (kwMatches.size > 0) {
      const header = document.createElement('div');
      header.className = 'sub-header';
      header.textContent = `🔍 "${q}" 검색 결과`;
      grid.appendChild(header);
      kwMatches.forEach(ch => {
        const btn = document.createElement('button');
        btn.className = 'char-btn';
        btn.textContent = ch;
        btn.title = `${ch}  (U+${ch.codePointAt(0).toString(16).toUpperCase().padStart(4,'0')})`;
        btn.onmouseenter = () => {
          document.getElementById('codeInfo').textContent = 'U+' + ch.codePointAt(0).toString(16).toUpperCase().padStart(4,'0');
        };
        btn.onclick = () => copyChar(ch, btn);
        grid.appendChild(btn);
      });
    }
    // 카테고리/서브네임/유니코드 기반 기존 검색도 유지
    const isEngQuery = /^[a-zA-Z]+$/.test(q);
    const isChoQuery = /^[ㄱ-ㅎ]+$/.test(q);

    for (const [catName, subs] of Object.entries(CATEGORIES)) {
      for (const [subName, chars] of Object.entries(subs)) {
        const subCho = getChosung(subName);
        const subEng = korToEngTypo(subName);
        const charArr = splitChars(chars);
        const filtered = charArr.filter(c => {
          if (kwMatches.has(c)) return false; // 이미 위에 표시됨
          
          let catMatch = catName.toLowerCase().includes(q) || getChosung(catName).includes(q) || korToEngTypo(catName).includes(q);
          let subMatch = subName.toLowerCase().includes(q);
          if (isEngQuery) subMatch = subMatch || subEng.includes(q);
          if (isChoQuery) subMatch = subMatch || subCho.includes(q);

          return (
            c.includes(q) ||
            subMatch ||
            catMatch ||
            ('U+' + c.codePointAt(0).toString(16).toUpperCase()).includes(q.toUpperCase())
          );
        });
        if (filtered.length === 0) continue;
        const header = document.createElement('div');
        header.className = 'sub-header';
        header.textContent = `${catName} › ${subName}`;
        grid.appendChild(header);
        const isEmoji = EMOJI_KEYS.some(k => k === catName);
        filtered.forEach(ch => {
          const btn = document.createElement('button');
          btn.className = 'char-btn' + (isEmoji ? ' emoji-cell' : '');
          btn.textContent = ch;
          btn.title = `${ch}  (U+${ch.codePointAt(0).toString(16).toUpperCase().padStart(4,'0')})`;
          btn.onmouseenter = () => {
            document.getElementById('codeInfo').textContent = 'U+' + ch.codePointAt(0).toString(16).toUpperCase().padStart(4,'0');
          };
          btn.onclick = () => copyChar(ch, btn);
          grid.appendChild(btn);
        });
      }
    }
    // 결과가 없으면 안내
    if (grid.children.length === 0) {
      const noResult = document.createElement('div');
      noResult.className = 'sub-header';
      noResult.textContent = `"${q}"에 대한 검색 결과가 없습니다.`;
      noResult.style.textAlign = 'center';
      noResult.style.padding = '40px 0';
      grid.appendChild(noResult);
    }
  } else {
    renderGrid();
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1500);
}


renderTabs();
renderGrid();
renderRecent();

// 거슬림 없는 부드러운 드래그 스크롤 (마우스용)
const recentSlider = document.getElementById('recentChars');
let isDown = false, isDragging = false, startX, scrollLeft;
recentSlider.addEventListener('mousedown', (e) => {
  isDown = true;
  isDragging = false;
  startX = e.pageX - recentSlider.offsetLeft;
  scrollLeft = recentSlider.scrollLeft;
});
recentSlider.addEventListener('mouseleave', () => { isDown = false; });
recentSlider.addEventListener('mouseup', () => { isDown = false; });
recentSlider.addEventListener('mousemove', (e) => {
  if (!isDown) return;
  const x = e.pageX - recentSlider.offsetLeft;
  const walk = (x - startX) * 1.5;
  if (Math.abs(walk) > 5) isDragging = true;
  recentSlider.scrollLeft = scrollLeft - walk;
  if (isDragging) e.preventDefault();
});
// 드래그 중 실수로 버튼이 복사(클릭)되는 것 방지
recentSlider.addEventListener('click', (e) => {
  if (isDragging) {
    e.preventDefault();
    e.stopPropagation();
  }
}, true);
