<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/special-chars/favicon.png">
<meta name="google-site-verification" content="TyyNKYVi782xFUYEwSxrYkTFRbP7qeWK7TUds1zObD0" />
<meta name="naver-site-verification" content="1240f9c95aabdaaf2a61568437d1a8cbc1749a0c" />
<title>특수 문자 & 이모지 입력기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .app {
    background: #16213e;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    width: 720px;
    max-width: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .titlebar {
    background: linear-gradient(135deg, #0f3460, #533483);
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
  }
  .titlebar h1 { font-size: 16px; font-weight: 600; color: #fff; letter-spacing: 1px; }
  .titlebar .search-box {
    display: flex; align-items: center;
    background: rgba(255,255,255,0.15);
    border-radius: 20px; padding: 4px 12px;
  }
  .titlebar .search-box input {
    background: none; border: none; outline: none;
    color: #fff; font-size: 13px; width: 140px; padding: 2px 4px;
  }
  .titlebar .search-box input::placeholder { color: rgba(255,255,255,0.5); }
  .titlebar .search-box svg { width: 14px; height: 14px; fill: rgba(255,255,255,0.6); }

  .recent-bar {
    background: #1a1a3e; padding: 8px 16px;
    display: flex; align-items: center; gap: 6px;
    min-height: 42px; border-bottom: 1px solid #2a2a5a;
  }
  .recent-bar .label { font-size: 11px; color: #8888bb; white-space: nowrap; margin-right: 4px; }
  .recent-bar .recent-chars { display: flex; gap: 2px; flex-wrap: nowrap; overflow-x: auto; }
  .recent-bar .char-btn { background: #2a2a5a; border: 1px solid #3a3a6a; }

  /* 탭 그룹 */
  .tab-groups {
    background: #1e1e3a;
    padding: 6px 10px 0;
  }
  .tab-group-label {
    font-size: 10px;
    color: #6666aa;
    padding: 6px 4px 3px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
  }
  .tab-group-label:first-child { padding-top: 2px; }
  .tab-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding-bottom: 4px;
  }
  .tab-divider {
    border: none;
    border-top: 1px solid #3a3a6a;
    margin: 2px 0;
  }
  .tab {
    padding: 7px 12px; font-size: 12px;
    border: none; background: #2a2a5a; color: #aaa;
    border-radius: 8px 8px 0 0; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .tab:hover { background: #3a3a7a; color: #ddd; }
  .tab.active { background: #533483; color: #fff; font-weight: 600; }
  .tab.emoji-tab { background: #2a3a2a; }
  .tab.emoji-tab:hover { background: #3a5a3a; }
  .tab.emoji-tab.active { background: #e67e22; color: #fff; }

  .grid-container {
    padding: 12px; height: 360px;
    overflow-y: auto; overflow-x: hidden;
  }
  .grid-container::-webkit-scrollbar { width: 6px; }
  .grid-container::-webkit-scrollbar-track { background: #1a1a3e; }
  .grid-container::-webkit-scrollbar-thumb { background: #533483; border-radius: 3px; }
  .char-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(38px, 1fr));
    gap: 3px;
  }
  .char-grid.emoji-mode {
    grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
  }
  .char-btn {
    width: 100%; aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; background: #222250;
    border: 1px solid #333366; border-radius: 6px;
    color: #e0e0e0; cursor: pointer;
    transition: all 0.15s; user-select: none; position: relative;
  }
  .char-btn:hover {
    background: #533483; border-color: #7b52b9;
    transform: scale(1.15); z-index: 2;
    box-shadow: 0 4px 12px rgba(83,52,131,0.5);
  }
  .char-btn:active { transform: scale(0.95); background: #6b44a3; }
  .char-btn.copied { background: #2ecc71 !important; border-color: #27ae60 !important; }
  .char-btn.emoji-cell {
    font-size: 24px; background: #1e2e1e; border-color: #2a3a2a;
  }
  .char-btn.emoji-cell:hover {
    background: #e67e22; border-color: #f39c12;
    box-shadow: 0 4px 12px rgba(230,126,34,0.5);
  }

  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #533483; color: #fff;
    padding: 10px 24px; border-radius: 24px;
    font-size: 14px; font-weight: 500;
    box-shadow: 0 4px 20px rgba(83,52,131,0.6);
    transition: transform 0.3s ease, opacity 0.3s ease;
    opacity: 0; pointer-events: none; z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  .bottom-bar {
    background: #1a1a3e; padding: 10px 16px;
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid #2a2a5a;
  }
  .preview {
    font-size: 28px; width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    background: #222250; border-radius: 8px; border: 1px solid #333366;
  }
  .bottom-bar .info { font-size: 11px; color: #8888bb; }
  .bottom-bar .info span { color: #bb88ff; font-family: monospace; }
  .action-btn {
    padding: 8px 20px; border: none; border-radius: 6px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-clear { background: #2a2a5a; color: #ccc; }
  .btn-clear:hover { background: #3a3a6a; }

  .sub-header {
    grid-column: 1 / -1; font-size: 11px; color: #8888bb;
    padding: 8px 4px 4px; border-bottom: 1px solid #2a2a5a; margin-bottom: 2px;
  }
  .sub-header:first-child { padding-top: 0; }

  /* 뒤로가기 버튼 */
  .back-btn {
    background: rgba(255,255,255,0.12); border: none; color: #ddd;
    font-size: 12px; cursor: pointer; padding: 5px 10px;
    border-radius: 6px; text-decoration: none;
    transition: background 0.2s; white-space: nowrap;
    display: flex; align-items: center; gap: 4px;
    font-family: inherit;
  }
  .back-btn:hover { background: rgba(255,255,255,0.22); color: #fff; }

  /* 도구 선택 드롭다운 */
  .tool-selector { position: relative; }
  .tool-current {
    background: none; border: none; color: #fff;
    font-size: 16px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    letter-spacing: 1px; padding: 0;
  }
  .dropdown-arrow { font-size: 16px; opacity: 0.7; transition: transform 0.2s; display: inline-flex; align-items: center; }
  .dropdown-arrow.open { transform: rotate(180deg); }
  .tool-menu {
    display: none; position: absolute; top: 100%; left: 0;
    margin-top: 8px; background: #1e1e3a;
    border: 1px solid #3a3a6a; border-radius: 8px;
    overflow: hidden; z-index: 100;
    min-width: 240px; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .tool-menu.show { display: block; }
  .tool-option {
    padding: 12px 16px; cursor: pointer;
    font-size: 14px; color: #ccc; transition: background 0.15s;
  }
  .tool-option:hover { background: #2a2a5a; color: #fff; }
  .tool-option.active { background: #533483; color: #fff; }

  /* 글자 수 계산기 */
  .counter-body { padding: 12px; }
  #counterInput {
    width: 100%; height: 200px; resize: vertical;
    background: #222250; border: 1px solid #333366; border-radius: 8px;
    color: #e0e0e0; font-size: 14px; padding: 12px;
    font-family: inherit; outline: none; line-height: 1.6;
  }
  #counterInput:focus { border-color: #533483; }
  #counterInput::placeholder { color: #555588; }
  .limit-bar {
    display: flex; gap: 8px; margin-top: 10px; align-items: center;
  }
  .limit-bar select, .limit-bar input {
    background: #2a2a5a; border: 1px solid #3a3a6a; border-radius: 6px;
    color: #e0e0e0; padding: 6px 10px; font-size: 12px;
    font-family: inherit; outline: none;
  }
  .limit-bar select { cursor: pointer; }
  .limit-bar input { width: 100px; }
  .stat-cards {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 8px; margin-top: 12px;
  }
  .stat-card {
    background: #222250; border: 1px solid #333366; border-radius: 8px;
    padding: 12px 8px; text-align: center;
  }
  .stat-value {
    font-size: 24px; font-weight: 700; color: #fff;
    font-variant-numeric: tabular-nums;
  }
  .stat-label { font-size: 11px; color: #8888bb; margin-top: 4px; }
  .stat-sub { font-size: 9px; color: #6666aa; margin-top: 2px; }
  .progress-wrap { margin-top: 12px; }
  .progress-bar {
    height: 8px; background: #2a2a5a; border-radius: 4px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: #533483; border-radius: 4px;
    transition: width 0.2s, background-color 0.3s;
  }
  .progress-fill.warn { background: #e67e22; }
  .progress-fill.over { background: #e74c3c; }
  .progress-text {
    font-size: 11px; color: #8888bb; text-align: right; margin-top: 4px;
  }
  .btn-copy { background: #533483; color: #fff; }
  .btn-copy:hover { background: #6b44a3; }

  /* === 날짜 계산기 === */
  .date-section { margin-bottom: 16px; }
  .date-section-title {
    font-size: 13px; font-weight: 600; color: #b0b0e0;
    margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
  }
  .date-row {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 8px; flex-wrap: wrap;
  }
  .date-row label { font-size: 12px; color: #8888bb; min-width: 42px; }
  .date-row input[type="date"],
  .date-row input[type="number"] {
    background: #2a2a5a; border: 1px solid #3a3a6a; border-radius: 6px;
    color: #e0e0ff; padding: 6px 10px; font-size: 13px; flex: 1;
    font-family: inherit; outline: none;
  }
  .date-row input[type="date"]:focus,
  .date-row input[type="number"]:focus { border-color: #533483; }
  .date-row input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
  .checkbox-row {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: #8888bb; margin-bottom: 8px;
  }
  .checkbox-row input[type="checkbox"] { accent-color: #533483; }
  .date-result-card {
    background: #222250; border-radius: 10px; padding: 14px;
    text-align: center; margin-top: 8px;
  }
  .date-result-value { font-size: 28px; font-weight: 700; color: #e0e0ff; }
  .date-result-sub { font-size: 12px; color: #8888bb; margin-top: 4px; }
  .quick-buttons { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .quick-btn {
    background: #2a2a5a; border: 1px solid #3a3a6a; border-radius: 6px;
    color: #b0b0e0; padding: 5px 12px; font-size: 11px; cursor: pointer;
    transition: background 0.15s; font-family: inherit;
  }
  .quick-btn:hover { background: #3a3a6a; }
  .section-divider { border: none; border-top: 1px solid #333366; margin: 16px 0; }
  /* === 단위 변환기 === */
  .conv-cat-tabs { background: #1e1e3a; padding: 6px 10px; border-radius: 8px; margin-bottom: 12px; }
  .conv-cat-tabs .tab-row { display: flex; flex-wrap: wrap; gap: 4px; }
  .conv-cat-tabs .tab { padding: 6px 10px; font-size: 11px; }
  .conv-row { margin-bottom: 14px; }
  .conv-row-title {
    font-size: 12px; color: #8888bb; margin-bottom: 6px;
    display: flex; align-items: center; gap: 4px;
  }
  .conv-fields { display: flex; align-items: center; gap: 6px; }
  .conv-field { flex: 1; }
  .conv-field label {
    display: block; font-size: 11px; color: #6666aa;
    margin-bottom: 2px; font-weight: 600;
  }
  .conv-field input[type="number"] {
    width: 100%; background: #2a2a5a; border: 1px solid #3a3a6a;
    border-radius: 6px; color: #e0e0ff; padding: 8px 10px;
    font-size: 14px; box-sizing: border-box; font-family: inherit;
  }
  .conv-field input:focus { border-color: #533483; outline: none; }
  .conv-arrow { color: #533483; font-size: 16px; flex-shrink: 0; margin-top: 16px; }
  .conv-option {
    width: 100%; background: #2a2a5a; border: 1px solid #3a3a6a;
    border-radius: 6px; color: #b0b0e0; padding: 5px 8px;
    font-size: 11px; margin-top: 4px; font-family: inherit;
  }
  .conv-triple .conv-field { flex: 1; min-width: 0; }
  .conv-extra {
    display: flex; align-items: center; gap: 6px;
    margin-top: 6px; font-size: 11px; color: #8888bb;
  }
  .conv-extra input {
    width: 60px; background: #2a2a5a; border: 1px solid #3a3a6a;
    border-radius: 6px; color: #e0e0ff; padding: 4px 8px;
    font-size: 12px; text-align: center; font-family: inherit;
  }
</style>
</head>
<body>

<div class="app">
  <div class="titlebar">
    <a href="https://teemozipsa.github.io/" class="back-btn">← 도구 모음</a>
    <div class="tool-selector">
      <button class="tool-current" onclick="toggleToolMenu()">
        <span id="toolTitle">⌨ 특수 문자 & 이모지</span>
        <span class="dropdown-arrow" id="dropdownArrow">▾</span>
      </button>
      <div class="tool-menu" id="toolMenu">
        <div class="tool-option active" data-tool="special-chars" onclick="switchTool('special-chars')">⌨ 특수 문자 & 이모지</div>
        <div class="tool-option" data-tool="char-counter" onclick="switchTool('char-counter')">📏 글자 수 계산기</div>
        <div class="tool-option" data-tool="date-calc" onclick="switchTool('date-calc')">📅 날짜 / D-Day 계산기</div>
        <div class="tool-option" data-tool="unit-conv" onclick="switchTool('unit-conv')">📐 생활 단위 변환기</div>
      </div>
    </div>
    <div class="search-box" id="searchBox">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" id="searchInput" placeholder="검색..." oninput="filterChars()">
    </div>
  </div>

  <div id="tool-special-chars">
    <div class="recent-bar">
      <span class="label">최근 ▸</span>
      <div class="recent-chars" id="recentChars"></div>
    </div>

    <div class="tab-groups" id="tabBar"></div>

    <div class="grid-container">
      <div class="char-grid" id="charGrid"></div>
    </div>

    <div class="bottom-bar">
      <div class="preview" id="preview"></div>
      <div class="info">클릭: 복사 | 유니코드: <span id="codeInfo">-</span></div>
      <button class="action-btn btn-clear" onclick="clearRecent()">최근 삭제</button>
    </div>
  </div>

  <div id="tool-char-counter" style="display:none">
    <div class="counter-body">
      <textarea id="counterInput" placeholder="여기에 텍스트를 입력하세요..." oninput="updateCounter()"></textarea>

      <div class="limit-bar">
        <select id="limitType" onchange="updateCounter()">
          <option value="none">제한 없음</option>
          <option value="chars">글자 수 제한</option>
          <option value="bytes-utf8">바이트 제한 (UTF-8)</option>
          <option value="bytes-euckr">바이트 제한 (EUC-KR)</option>
        </select>
        <input type="number" id="limitValue" placeholder="예: 500" oninput="updateCounter()" style="display:none">
      </div>

      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-value" id="statChars">0</div>
          <div class="stat-label">전체 글자</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statNoSpace">0</div>
          <div class="stat-label">공백 제외</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statWords">0</div>
          <div class="stat-label">단어</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statLines">0</div>
          <div class="stat-label">줄</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statBytes">0</div>
          <div class="stat-label">바이트</div>
          <div class="stat-sub" id="statBytesType">UTF-8</div>
        </div>
      </div>

      <div class="progress-wrap" id="progressWrap" style="display:none">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">0 / 500</div>
      </div>
    </div>

    <div class="bottom-bar">
      <div class="info">실시간 계산</div>
      <div style="display:flex;gap:8px">
        <button class="action-btn btn-clear" onclick="clearCounter()">초기화</button>
        <button class="action-btn btn-copy" onclick="copyStats()">결과 복사</button>
      </div>
    </div>
  </div>

  <div id="tool-date-calc" style="display:none">
    <div class="counter-body">
      <!-- 기능1: D-Day 계산 -->
      <div class="date-section">
        <div class="date-section-title">📆 D-Day 계산</div>
        <div class="date-row">
          <label>시작일</label>
          <input type="date" id="ddayStart">
        </div>
        <div class="date-row">
          <label>목표일</label>
          <input type="date" id="ddayEnd">
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="ddayInclusive">
          <label for="ddayInclusive">시작일을 1일로 포함 (초일 산입)</label>
          <span title="체크하면 시작일을 D-1이 아닌 D-Day 1일째로 계산합니다.&#10;예: 1월1일~1월3일 → 체크 시 3일, 미체크 시 2일&#10;기념일·만일 계산에는 체크, 업무 D-Day는 미체크 권장" style="cursor:help;color:#8888bb;">ⓘ</span>
        </div>
        <div class="date-result-card" id="ddayResult">
          <div class="date-result-value" id="ddayValue">-</div>
          <div class="date-result-sub" id="ddaySub">날짜를 선택하세요</div>
        </div>
      </div>

      <hr class="section-divider">

      <!-- 기능2: 날짜 더하기/빼기 -->
      <div class="date-section">
        <div class="date-section-title">🧮 날짜 계산 (기준일 ± 일수)</div>
        <div class="date-row">
          <label>기준일</label>
          <input type="date" id="dateBase">
        </div>
        <div class="date-row">
          <label>일수</label>
          <input type="number" id="dateDays" placeholder="예: 100, -30">
        </div>
        <div class="quick-buttons">
          <button class="quick-btn" onclick="applyQuick(7)">+7일</button>
          <button class="quick-btn" onclick="applyQuick(30)">+30일</button>
          <button class="quick-btn" onclick="applyQuick(100)">+100일</button>
          <button class="quick-btn" onclick="applyQuick(365)">+1년</button>
          <button class="quick-btn" onclick="applyQuick(-7)">-7일</button>
          <button class="quick-btn" onclick="applyQuick(-30)">-30일</button>
          <button class="quick-btn" onclick="applyQuick(-100)">-100일</button>
          <button class="quick-btn" onclick="applyQuick(-365)">-1년</button>
        </div>
        <div class="date-result-card" id="dateAddResult">
          <div class="date-result-value" id="dateAddValue">-</div>
          <div class="date-result-sub" id="dateAddSub">기준일과 일수를 입력하세요</div>
        </div>
      </div>
    </div>

    <div class="bottom-bar">
      <div class="info">실시간 계산</div>
      <div style="display:flex;gap:8px">
        <button class="action-btn btn-clear" onclick="clearDateCalc()">초기화</button>
        <button class="action-btn btn-copy" onclick="copyDateResult()">결과 복사</button>
      </div>
    </div>
  </div>

  <div id="tool-unit-conv" style="display:none">
    <div class="counter-body" style="overflow-y:auto;max-height:480px">
      <div class="conv-cat-tabs">
        <div class="tab-row" id="unitCatTabs"></div>
      </div>
      <div id="unitConvArea"></div>

function splitChars(str) {
  if (Intl.Segmenter) {
    return [...new Intl.Segmenter().segment(str)].map(s => s.segment);
  }
  return [...str];
}

function isEmojiTab(name) {
  return EMOJI_KEYS.includes(name);
}

function renderGrid(filter = '') {
  const grid = document.getElementById('charGrid');
  grid.innerHTML = '';
  const isEmoji = isEmojiTab(currentTab);
  grid.className = 'char-grid' + (isEmoji ? ' emoji-mode' : '');
  const cat = CATEGORIES[currentTab];
  for (const [subName, chars] of Object.entries(cat)) {
    const charArr = splitChars(chars);
    const filtered = filter
      ? charArr.filter(c => c.includes(filter) || subName.includes(filter) || ('U+' + c.codePointAt(0).toString(16).toUpperCase()).includes(filter.toUpperCase()))
      : charArr;
    if (filtered.length === 0) continue;
    const header = document.createElement('div');
    header.className = 'sub-header';
    header.textContent = subName;
    grid.appendChild(header);
    filtered.forEach(ch => {
      const btn = document.createElement('button');
      btn.className = 'char-btn' + (isEmoji ? ' emoji-cell' : '');
      btn.textContent = ch;
      btn.title = `${ch}  (U+${ch.codePointAt(0).toString(16).toUpperCase().padStart(4,'0')})`;
      btn.onmouseenter = () => {
        document.getElementById('preview').textContent = ch;
        document.getElementById('codeInfo').textContent = 'U+' + ch.codePointAt(0).toString(16).toUpperCase().padStart(4,'0');
      };
      btn.onclick = () => copyChar(ch, btn);
      grid.appendChild(btn);
    });
  }
}

function copyChar(ch, btnEl) {
  navigator.clipboard.writeText(ch).then(() => {
    showToast(`'${ch}' 복사됨!`);
    if (btnEl) {
      btnEl.classList.add('copied');
      setTimeout(() => btnEl.classList.remove('copied'), 400);
    }
    addRecent(ch);
  });
}

function addRecent(ch) {
  recentChars = recentChars.filter(c => c !== ch);
  recentChars.unshift(ch);
  if (recentChars.length > 20) recentChars = recentChars.slice(0, 20);

  renderRecent();
}

function filterChars() {
  const q = document.getElementById('searchInput').value.trim();
  if (q) {
    const grid = document.getElementById('charGrid');
    grid.innerHTML = '';
    grid.className = 'char-grid';
    for (const [catName, subs] of Object.entries(CATEGORIES)) {
      for (const [subName, chars] of Object.entries(subs)) {
        const charArr = splitChars(chars);
        const filtered = charArr.filter(c =>
          c.includes(q) ||
          subName.toLowerCase().includes(q.toLowerCase()) ||
          catName.toLowerCase().includes(q.toLowerCase()) ||
          ('U+' + c.codePointAt(0).toString(16).toUpperCase()).includes(q.toUpperCase())
        );
        if (filtered.length === 0) continue;
        const header = document.createElement('div');
        header.className = 'sub-header';
        header.textContent = `${catName} › ${subName}`;
        grid.appendChild(header);
        const isEmoji = EMOJI_KEYS.some(k => k === catName);
        filtered.forEach(ch => {
          const btn = document.createElement('button');
          btn.className = 'char-btn' + (isEmoji ? ' emoji-cell' : '');
          btn.textContent = ch;
          btn.onmouseenter = () => {
            document.getElementById('preview').textContent = ch;
            document.getElementById('codeInfo').textContent = 'U+' + ch.codePointAt(0).toString(16).toUpperCase().padStart(4,'0');
          };
          btn.onclick = () => copyChar(ch, btn);
          grid.appendChild(btn);
        });
      }
    }
  } else {
    renderGrid();
  }
}

// 글자 수 계산기
function updateCounter() {
  const text = document.getElementById('counterInput').value;
  const chars = [...text].length;
  const noSpace = [...text.replace(/\s/g, '')].length;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const lines = text ? text.split('\n').length : 0;
  const utf8Bytes = new TextEncoder().encode(text).length;
  const euckrBytes = calcEuckrBytes(text);

  document.getElementById('statChars').textContent = chars.toLocaleString();
  document.getElementById('statNoSpace').textContent = noSpace.toLocaleString();
  document.getElementById('statWords').textContent = words.toLocaleString();
  document.getElementById('statLines').textContent = lines.toLocaleString();

  const limitType = document.getElementById('limitType').value;
  if (limitType === 'bytes-euckr') {
    document.getElementById('statBytes').textContent = euckrBytes.toLocaleString();
    document.getElementById('statBytesType').textContent = 'EUC-KR';
  } else {
    document.getElementById('statBytes').textContent = utf8Bytes.toLocaleString();
    document.getElementById('statBytesType').textContent = 'UTF-8';
  }

  document.getElementById('limitValue').style.display = limitType === 'none' ? 'none' : '';
  updateProgress(limitType, chars, utf8Bytes, euckrBytes);
}

function calcEuckrBytes(text) {
  let bytes = 0;
  for (const ch of text) {
    bytes += ch.codePointAt(0) <= 0x7F ? 1 : 2;
  }
  return bytes;
}

function updateProgress(limitType, chars, utf8, euckr) {
  const wrap = document.getElementById('progressWrap');
  if (limitType === 'none') { wrap.style.display = 'none'; return; }
  const limit = parseInt(document.getElementById('limitValue').value) || 0;
  if (!limit) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  let current = limitType === 'chars' ? chars : limitType === 'bytes-utf8' ? utf8 : euckr;
  const pct = Math.min((current / limit) * 100, 100);
  const fill = document.getElementById('progressFill');
  fill.style.width = pct + '%';
  fill.className = 'progress-fill' + (current > limit ? ' over' : pct > 80 ? ' warn' : '');
  document.getElementById('progressText').textContent =
    current.toLocaleString() + ' / ' + limit.toLocaleString() + (current > limit ? ' ⚠ 초과!' : '');
}

function clearCounter() {
  document.getElementById('counterInput').value = '';
  updateCounter();
}

function copyStats() {
  const text = document.getElementById('counterInput').value;
  const chars = [...text].length;
  const noSpace = [...text.replace(/\s/g, '')].length;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const lines = text ? text.split('\n').length : 0;
  const utf8 = new TextEncoder().encode(text).length;
  const euckr = calcEuckrBytes(text);
  const result = `전체 글자: ${chars}\n공백 제외: ${noSpace}\n단어 수: ${words}\n줄 수: ${lines}\nUTF-8 바이트: ${utf8}\nEUC-KR 바이트: ${euckr}`;
  navigator.clipboard.writeText(result).then(() => showToast('결과가 복사되었습니다!'));
}

// === 날짜/D-Day 계산기 ===
function calcDday() {
  const start = document.getElementById('ddayStart').value;
  const end = document.getElementById('ddayEnd').value;
  if (!start || !end) {
    document.getElementById('ddayValue').textContent = '-';
    document.getElementById('ddaySub').textContent = '날짜를 선택하세요';
    return;
  }
  const s = new Date(start), e = new Date(end);
  let diff = Math.round((e - s) / 86400000);
  const inclusive = document.getElementById('ddayInclusive').checked;
  if (inclusive) diff += 1;
  const absD = Math.abs(diff);
  if (inclusive) {
    document.getElementById('ddayValue').textContent = `${absD}일`;
  } else {
    if (diff === 0) document.getElementById('ddayValue').textContent = 'D-Day';
    else if (diff > 0) document.getElementById('ddayValue').textContent = `D-${diff}`;
    else document.getElementById('ddayValue').textContent = `D+${Math.abs(diff)}`;
  }
  const weeks = Math.floor(absD / 7);
  const remain = absD % 7;
  const months = Math.floor(absD / 30);
  let sub = `${absD}일`;
  if (weeks > 0) sub += ` = ${weeks}주 ${remain}일`;
  if (months > 0) sub += ` ≈ ${months}개월`;
  document.getElementById('ddaySub').textContent = sub;
}

function calcDateAdd() {
  const base = document.getElementById('dateBase').value;
  const days = parseInt(document.getElementById('dateDays').value);
  if (!base || isNaN(days)) {
    document.getElementById('dateAddValue').textContent = '-';
    document.getElementById('dateAddSub').textContent = '기준일과 일수를 입력하세요';
    return;
  }
  const d = new Date(base);
  d.setDate(d.getDate() + days);
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
  const dayName = weekdays[d.getDay()];
  document.getElementById('dateAddValue').textContent = `${yyyy}-${mm}-${dd} (${dayName})`;
  const sign = days >= 0 ? '+' : '';
  document.getElementById('dateAddSub').textContent = `${base} 부터 ${sign}${days}일`;
}

function applyQuick(days) {
  if (!document.getElementById('dateBase').value) {
    const today = new Date();
    const y = today.getFullYear();
    const m = String(today.getMonth() + 1).padStart(2, '0');
    const d = String(today.getDate()).padStart(2, '0');
    document.getElementById('dateBase').value = `${y}-${m}-${d}`;
  }
  document.getElementById('dateDays').value = days;
  calcDateAdd();
}

function copyDateResult() {
  const dday = document.getElementById('ddayValue').textContent;
  const ddaySub = document.getElementById('ddaySub').textContent;
  const dateAdd = document.getElementById('dateAddValue').textContent;
  const dateAddSub = document.getElementById('dateAddSub').textContent;
  let text = '';
  if (dday !== '-') text += `D-Day: ${dday} (${ddaySub})\n`;

  if (!text) { showToast('복사할 결과가 없습니다'); return; }
  navigator.clipboard.writeText(text.trim()).then(() => showToast('결과가 복사되었습니다!'));
}

      <label><input type="radio" name="shoeGender" value="female" onchange="_shoeGender='female';convSync('shoe','kr')"> 여성</label>
    </div>
    <div class="conv-fields conv-triple">
      <div class="conv-field"><label>KR (mm)</label>
        <input type="number" id="conv-shoe-kr" oninput="convSync('shoe','kr')" placeholder="270">
      </div>
      <div class="conv-field"><label>US</label>
        <input type="number" id="conv-shoe-us" oninput="convSync('shoe','us')" placeholder="8" step="0.5">
      </div>
      <div class="conv-field"><label>EU</label>
        <input type="number" id="conv-shoe-eu" oninput="convSync('shoe','eu')" placeholder="42" step="0.5">
      </div>
    </div>`;
}

function renderData() {
  return `<div class="conv-row-title">💾 데이터 용량</div>
    <div class="conv-fields conv-triple">
      <div class="conv-field"><label>MB</label>
        <input type="number" id="conv-data-mb" oninput="convSync('data','mb')" placeholder="0">
      </div>
      <div class="conv-field"><label>GB</label>
        <input type="number" id="conv-data-gb" oninput="convSync('data','gb')" placeholder="0">
      </div>
      <div class="conv-field"><label>TB</label>
        <input type="number" id="conv-data-tb" oninput="convSync('data','tb')" placeholder="0">
      </div>
    </div>`;
}

function renderDpi(item) {
  return `<span class="conv-row-title">DPI 기반 변환</span>
    <div class="conv-fields">
      <div class="conv-field"><label>${item.a}</label>
        <input type="number" id="conv-${item.id}-a" oninput="convSync('${item.id}','a')" placeholder="0">
      </div>
      <span class="conv-arrow">↔</span>
      <div class="conv-field"><label>${item.b}</label>
        <input type="number" id="conv-${item.id}-b" oninput="convSync('${item.id}','b')" placeholder="0">
      </div>
    </div>
    <div class="conv-extra">
      <label>DPI:</label>
      <input type="number" id="conv-${item.id}-dpi" value="${item.dpiDefault}" oninput="convSync('${item.id}','a')">
    </div>`;
}

function convSync(id, side) {
  if (_unitSyncing) return;
  _unitSyncing = true;
  try {
    if (id === 'shoe') { syncShoe(side); }
    else if (id === 'data') { syncData(side); }
    else {
      const item = findItem(id);
      if (!item) { _unitSyncing = false; return; }
      const elA = document.getElementById(`conv-${id}-a`);
      const elB = document.getElementById(`conv-${id}-b`);
      let factor = item.factor || 1;
      if (item.type === 'options') {
        const sel = document.getElementById(`conv-${id}-opt`);
        factor = item.options[parseInt(sel.value)].factor;
      }
      if (item.type === 'dpi') {
        const dpiEl = document.getElementById(`conv-${id}-dpi`);
        const dpi = parseFloat(dpiEl.value) || item.dpiDefault;
        factor = 25.4 / dpi;
      }
      if (side === 'a') {
        const v = parseFloat(elA.value);
        elB.value = isNaN(v) ? '' : roundDec(item.toB ? item.toB(v) : v * factor, item.dec);
      } else {
        const v = parseFloat(elB.value);
        elA.value = isNaN(v) ? '' : roundDec(item.toA ? item.toA(v) : v / factor, item.dec);
      }
    }
  } finally { _unitSyncing = false; }
}

function syncShoe(side) {
  const krEl = document.getElementById('conv-shoe-kr');
  const usEl = document.getElementById('conv-shoe-us');
  const euEl = document.getElementById('conv-shoe-eu');
  const gIdx = _shoeGender === 'male' ? 0 : 1;
  const entries = Object.entries(SHOE_TABLE);

  if (side === 'kr') {
    const kr = parseFloat(krEl.value);
    if (isNaN(kr)) { usEl.value = ''; euEl.value = ''; return; }
    let best = entries.reduce((a, b) => Math.abs(b[0] - kr) < Math.abs(a[0] - kr) ? b : a);
    usEl.value = best[1][gIdx];
    euEl.value = best[1][2];
  } else if (side === 'us') {
    const us = parseFloat(usEl.value);
    if (isNaN(us)) { krEl.value = ''; euEl.value = ''; return; }
    let best = entries.reduce((a, b) => Math.abs(b[1][gIdx] - us) < Math.abs(a[1][gIdx] - us) ? b : a);
    krEl.value = best[0];
    euEl.value = best[1][2];
  } else {
    const eu = parseFloat(euEl.value);
    if (isNaN(eu)) { krEl.value = ''; usEl.value = ''; return; }
    let best = entries.reduce((a, b) => Math.abs(b[1][2] - eu) < Math.abs(a[1][2] - eu) ? b : a);
    krEl.value = best[0];
    usEl.value = best[1][gIdx];
  }
}

function syncData(side) {
  const mbEl = document.getElementById('conv-data-mb');
  const gbEl = document.getElementById('conv-data-gb');
  const tbEl = document.getElementById('conv-data-tb');

  if (side === 'mb') {
    const v = parseFloat(mbEl.value);
    if (isNaN(v)) { gbEl.value = ''; tbEl.value = ''; return; }
    gbEl.value = roundDec(v / 1024, 4);
    tbEl.value = roundDec(v / 1048576, 6);
  } else if (side === 'gb') {
    const v = parseFloat(gbEl.value);
    if (isNaN(v)) { mbEl.value = ''; tbEl.value = ''; return; }
    mbEl.value = roundDec(v * 1024, 2);
    tbEl.value = roundDec(v / 1024, 6);
  } else {
    const v = parseFloat(tbEl.value);
    if (isNaN(v)) { mbEl.value = ''; gbEl.value = ''; return; }
    mbEl.value = roundDec(v * 1048576, 2);
    gbEl.value = roundDec(v * 1024, 4);
  }
}

function clearUnitConv() {
  document.querySelectorAll('#unitConvArea input[type="number"]').forEach(el => el.value = '');
}

function copyUnitResult() {
  const cat = UNIT_DATA[currentUnitCat];
  let lines = [];
  for (const item of cat.items) {
    if (item.type === 'shoe') {
      const kr = document.getElementById('conv-shoe-kr')?.value;
      const us = document.getElementById('conv-shoe-us')?.value;
      const eu = document.getElementById('conv-shoe-eu')?.value;
      if (kr || us || eu) lines.push(`신발: KR ${kr||'-'} = US ${us||'-'} = EU ${eu||'-'}`);
    } else if (item.type === 'data') {
      const mb = document.getElementById('conv-data-mb')?.value;
      const gb = document.getElementById('conv-data-gb')?.value;
      const tb = document.getElementById('conv-data-tb')?.value;
      if (mb || gb || tb) lines.push(`${mb||0} MB = ${gb||0} GB = ${tb||0} TB`);
    } else {
      const a = document.getElementById(`conv-${item.id}-a`)?.value;
      const b = document.getElementById(`conv-${item.id}-b`)?.value;
      if (a && b) lines.push(`${a} ${item.a} = ${b} ${item.b}`);
    }
  }
  if (lines.length === 0) { showToast('변환할 값을 입력하세요'); return; }
  navigator.clipboard.writeText(lines.join('\n')).then(() => showToast('결과가 복사되었습니다'));
}

renderTabs();
renderGrid();
renderRecent();
renderUnitCats();
renderConverters();

// 해시 라우팅: URL에 #counter, #date, #unit 이 있으면 해당 도구로 전환
(function handleHash() {
  const hashMap = {
    '#counter': 'char-counter',
    '#date': 'date-calc',
    '#unit': 'unit-conv'
  };
  const hash = window.location.hash;
  if (hash && hashMap[hash]) {
    switchTool(hashMap[hash]);
  }
})();
</script>
