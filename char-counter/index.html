<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<script>(function(){var t;try{t=localStorage.getItem('theme')}catch(e){}if(t!=='light'&&t!=='dark'){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}document.documentElement.setAttribute('data-theme',t)})()</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/special-chars/favicon.png">
<link rel="stylesheet" href="/special-chars/theme.css">
<link rel="manifest" href="/special-chars/manifest.json">
<link rel="apple-touch-icon" href="/special-chars/favicon.png">
<title>📏 글자 수 계산기 — 티모집사</title>
<meta name="description" content="글자 수, 공백 제외, 단어 수, 줄 수, 바이트(UTF-8/EUC-KR)를 실시간으로 계산합니다.">
<meta property="og:title" content="📏 글자 수 계산기 — 티모집사">
<meta property="og:description" content="글자 수, 공백 제외, 단어 수, 줄 수, 바이트(UTF-8/EUC-KR)를 실시간으로 계산합니다.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://teemozipsa.github.io/special-chars/char-counter/">
<meta property="og:image" content="https://teemozipsa.github.io/special-chars/favicon.png">
<link rel="canonical" href="https://teemozipsa.github.io/special-chars/char-counter/">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3501868770820650" crossorigin="anonymous"></script>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg-body);color:var(--text-primary);display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px}
  .app{background:var(--bg-app);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.4);width:720px;max-width:100%;overflow:hidden;display:flex;flex-direction:column}
  .header{background:var(--bg-header);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
  .header h1{font-size:15px;font-weight:600;color:#fff}
  .back-btn{background:rgba(255,255,255,.15);border:none;color:rgba(255,255,255,.9);font-size:12px;cursor:pointer;padding:5px 10px;border-radius:6px;text-decoration:none;transition:background .2s;font-family:inherit;display:flex;align-items:center;gap:4px}
  .back-btn:hover{background:rgba(255,255,255,.25);color:#fff}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:var(--text-on-accent);padding:10px 24px;border-radius:24px;font-size:14px;font-weight:500;box-shadow:0 4px 20px rgba(83,52,131,.6);transition:transform .3s ease,opacity .3s ease;opacity:0;pointer-events:none;z-index:999}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .bottom-bar{background:var(--bg-bar);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border)}
  .bottom-bar .info{font-size:11px;color:var(--text-info)}
  .action-btn{padding:8px 20px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
  .btn-clear{background:var(--bg-btn);color:var(--btn-clear-text)}.btn-clear:hover{background:var(--bg-btn-hover)}
  .btn-copy{background:var(--accent);color:var(--text-on-accent)}.btn-copy:hover{background:var(--accent-hover)}

  .counter-body{padding:12px;flex:1}
  #counterInput{width:100%;height:200px;resize:vertical;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:14px;padding:12px;font-family:inherit;outline:none;line-height:1.6}
  #counterInput:focus{border-color:var(--accent)}
  #counterInput::placeholder{color:var(--text-muted)588}
  .limit-bar{display:flex;gap:8px;margin-top:10px;align-items:center}
  .limit-bar select,.limit-bar input{background:var(--bg-btn);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);padding:6px 10px;font-size:12px;font-family:inherit;outline:none}
  .limit-bar select{cursor:pointer}
  .limit-bar input{width:100px}
  .stat-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:12px}
  .stat-card{background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:12px 8px;text-align:center}
  .stat-value{font-size:24px;font-weight:700;color:var(--text-primary);font-variant-numeric:tabular-nums}
  .stat-label{font-size:11px;color:var(--text-info);margin-top:4px}
  .stat-sub{font-size:9px;color:var(--calc-expr-text);margin-top:2px}
  .progress-wrap{margin-top:12px}
  .progress-bar{height:8px;background:var(--bg-btn);border-radius:4px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .2s,background-color .3s}
  .progress-fill.warn{background:#e67e22}
  .progress-fill.over{background:#e74c3c}
  .progress-text{font-size:11px;color:var(--text-info);text-align:right;margin-top:4px}
  @media(max-width:600px){.stat-cards{grid-template-columns:repeat(3,1fr)}}
  .guide-section{margin:12px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .guide-section summary{padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-guide);list-style:none;display:flex;align-items:center;gap:6px;background:var(--bg-guide);transition:background .2s}
  .guide-section summary:hover{background:var(--bg-guide-hover)}
  .guide-section[open] summary{background:var(--bg-btn);border-bottom:1px solid var(--border)}
  .guide-content{padding:12px 14px;font-size:12px;color:var(--text-info);line-height:1.8}
  .guide-content ol{padding-left:20px}.guide-content li{margin-bottom:4px}
.scroll-top-btn{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--accent);color:var(--text-on-accent);border:none;font-size:20px;font-weight:700;cursor:pointer;z-index:900;box-shadow:0 2px 12px rgba(83,52,131,.5);opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s,transform .2s}
.scroll-top-btn.visible{opacity:1;visibility:visible}
.scroll-top-btn:hover{transform:scale(1.1);background:var(--accent-hover)}
@media(max-width:640px){.scroll-top-btn{bottom:70px;right:16px;width:40px;height:40px;font-size:18px}}
.footer{background:var(--bg-bar);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);font-size:11px;color:var(--text-info)}
.footer a{color:var(--text-info);text-decoration:none;font-weight:600;transition:color .2s}
.footer a:hover{color:var(--text-secondary)}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <a href="https://teemozipsa.github.io/" class="back-btn">← 도구 모음</a>
    <h1>📏 글자 수 계산기</h1>
  </div>

  <div class="counter-body">
    <textarea id="counterInput" placeholder="여기에 텍스트를 입력하세요..." oninput="updateCounter()"></textarea>

    <div class="limit-bar">
      <select id="limitType" onchange="updateCounter()">
        <option value="none">제한 없음</option>
        <option value="chars">글자 수 제한</option>
        <option value="bytes-utf8">바이트 제한 (UTF-8)</option>
        <option value="bytes-euckr">바이트 제한 (EUC-KR)</option>
      </select>
      <input type="number" id="limitValue" placeholder="예: 500" oninput="updateCounter()" style="display:none">
    </div>

    <div class="stat-cards">
      <div class="stat-card"><div class="stat-value" id="statChars">0</div><div class="stat-label">전체 글자</div></div>
      <div class="stat-card"><div class="stat-value" id="statNoSpace">0</div><div class="stat-label">공백 제외</div></div>
      <div class="stat-card"><div class="stat-value" id="statWords">0</div><div class="stat-label">단어</div></div>
      <div class="stat-card"><div class="stat-value" id="statLines">0</div><div class="stat-label">줄</div></div>
      <div class="stat-card"><div class="stat-value" id="statBytes">0</div><div class="stat-label">바이트</div><div class="stat-sub" id="statBytesType">UTF-8</div></div>
    </div>

    <div class="progress-wrap" id="progressWrap" style="display:none">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">0 / 500</div>
    </div>
  </div>

  <details class="guide-section">
    <summary>📖 사용 방법</summary>
    <div class="guide-content">
      <ol>
        <li>텍스트 입력 영역에 분석할 텍스트를 붙여넣거나 직접 입력하세요.</li>
        <li>전체 글자, 공백 제외, 단어, 줄, 바이트 수가 실시간으로 표시됩니다.</li>
        <li>제한 설정에서 글자 수 또는 바이트 제한을 걸면 진행률 바가 나타납니다.</li>
        <li>"결과 복사" 버튼으로 통계를 클립보드에 복사할 수 있습니다.</li>
      </ol>
    </div>
  </details>
    <div class="footer"><span>실시간 분석</span><a href="https://teemozipsa.github.io/">😺 더 많은 도구</a></div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove('show'),1500)}

// 자동 저장: 페이지 로드 시 이전 입력 복원
(function(){const saved=localStorage.getItem('charCounter_text');if(saved){document.getElementById('counterInput').value=saved;updateCounter()}})();

function updateCounter(){
  const text=document.getElementById('counterInput').value;
  // 자동 저장: 입력할 때마다 localStorage에 저장
  try{localStorage.setItem('charCounter_text',text)}catch(e){}
  const chars=[...text].length;
  const noSpace=[...text.replace(/\s/g,'')].length;
  const words=text.trim()?text.trim().split(/\s+/).length:0;
  const lines=text?text.split('\n').length:0;
  const utf8Bytes=new TextEncoder().encode(text).length;
  const euckrBytes=calcEuckrBytes(text);
  document.getElementById('statChars').textContent=chars.toLocaleString();
  document.getElementById('statNoSpace').textContent=noSpace.toLocaleString();
  document.getElementById('statWords').textContent=words.toLocaleString();
  document.getElementById('statLines').textContent=lines.toLocaleString();
  const limitType=document.getElementById('limitType').value;
  if(limitType==='bytes-euckr'){document.getElementById('statBytes').textContent=euckrBytes.toLocaleString();document.getElementById('statBytesType').textContent='EUC-KR'}
  else{document.getElementById('statBytes').textContent=utf8Bytes.toLocaleString();document.getElementById('statBytesType').textContent='UTF-8'}
  document.getElementById('limitValue').style.display=limitType==='none'?'none':'';
  updateProgress(limitType,chars,utf8Bytes,euckrBytes);
}

function calcEuckrBytes(text){let bytes=0;for(const ch of text){bytes+=ch.codePointAt(0)<=0x7F?1:2}return bytes}

function updateProgress(limitType,chars,utf8,euckr){
  const wrap=document.getElementById('progressWrap');
  if(limitType==='none'){wrap.style.display='none';return}
  const limit=parseInt(document.getElementById('limitValue').value)||0;
  if(!limit){wrap.style.display='none';return}
  wrap.style.display='';
  let current=limitType==='chars'?chars:limitType==='bytes-utf8'?utf8:euckr;
  const pct=Math.min((current/limit)*100,100);
  const fill=document.getElementById('progressFill');
  fill.style.width=pct+'%';
  fill.className='progress-fill'+(current>limit?' over':pct>80?' warn':'');
  document.getElementById('progressText').textContent=current.toLocaleString()+' / '+limit.toLocaleString()+(current>limit?' ⚠ 초과!':'');
}

function clearCounter(){document.getElementById('counterInput').value='';try{localStorage.removeItem('charCounter_text')}catch(e){}updateCounter();showToast('초기화 완료')}

function copyStats(){
  const text=document.getElementById('counterInput').value;
  const chars=[...text].length;const noSpace=[...text.replace(/\s/g,'')].length;
  const words=text.trim()?text.trim().split(/\s+/).length:0;const lines=text?text.split('\n').length:0;
  const utf8=new TextEncoder().encode(text).length;const euckr=calcEuckrBytes(text);
  const result=`전체 글자: ${chars}\n공백 제외: ${noSpace}\n단어 수: ${words}\n줄 수: ${lines}\nUTF-8 바이트: ${utf8}\nEUC-KR 바이트: ${euckr}`;
  navigator.clipboard.writeText(result).then(()=>showToast('결과가 복사되었습니다!'));
}
</script>
<button class="scroll-top-btn" aria-label="맨 위로">↑</button>
<script>(function(){var b=document.querySelector('.scroll-top-btn');if(!b)return;window.addEventListener('scroll',function(){b.classList.toggle('visible',window.scrollY>200)});b.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'})})})();</script>
<script src="/special-chars/theme-toggle.js"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/special-chars/sw.js',{scope:'/'}).catch(function(){})}</script>
</body>
</html>
