<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/special-chars/favicon.png">
<title>🔥 칼로리 계산기 — 티모집사</title>
<meta name="description" content="기초대사량(BMR), 1일 권장 칼로리, 다이어트 목표 칼로리 및 탄단지 황금 비율을 계산해 드립니다.">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard',sans-serif;background:#0f0f23;color:#e0e0f0;min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:flex-start}
  .app{background:#16213e;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.5);width:480px;max-width:100%;overflow:hidden}
  .header{background:linear-gradient(135deg,#ff4b2b,#ff416c);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
  .back-btn{background:rgba(255,255,255,.12);border:none;color:#fff;font-size:12px;cursor:pointer;padding:5px 10px;border-radius:6px;text-decoration:none;transition:background .2s;font-family:inherit;display:flex;align-items:center;gap:4px}
  .back-btn:hover{background:rgba(255,255,255,.22)}
  .header h1{font-size:15px;font-weight:600;color:#fff}
  .body{padding:16px;display:flex;flex-direction:column;gap:12px}
  .section{background:#1a1a3e;border-radius:12px;padding:14px 16px;border:1px solid #2a2a5a}
  .section-title{font-size:12px;font-weight:700;color:#8888bb;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .field-row{display:flex;gap:8px;margin-bottom:8px}
  .field-row:last-child{margin-bottom:0}
  .field{flex:1;display:flex;flex-direction:column;gap:4px}
  .field label{font-size:11px;color:#6666aa;font-weight:600}
  .field input,.field select{background:#12122e;border:1px solid #2a2a5a;border-radius:8px;color:#e0e0ff;padding:9px 10px;font-size:14px;font-family:inherit;outline:none;width:100%}
  .field input:focus,.field select:focus{border-color:#ff4b2b}

  .gender-toggle{display:flex;gap:4px;background:#12122e;padding:4px;border-radius:8px;border:1px solid #2a2a5a}
  .gender-btn{flex:1;padding:6px;text-align:center;font-size:13px;border-radius:6px;cursor:pointer;color:#6666aa;transition:all .2s;border:none;background:transparent}
  .gender-btn.active{background:#ff4b2b;color:#fff;font-weight:bold}

  .result-box{background:linear-gradient(135deg,#1a1a50,#2a1a50);border:1px solid #3a2a6a;border-radius:12px;padding:16px;text-align:center;margin-top:4px}
  .result-title{font-size:11px;color:#8888bb;margin-bottom:4px}
  .result-value{font-size:24px;font-weight:800;color:#fff;margin-bottom:2px}
  .result-value span{font-size:14px;font-weight:normal;color:#aaa}
  .result-desc{font-size:11px;color:#6666aa}

  .macros-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
  .macro-card{background:#12122e;border:1px solid #2a2a5a;border-radius:10px;padding:12px 8px;text-align:center}
  .m-label{font-size:11px;font-weight:600;margin-bottom:4px}
  .m-carbs{color:#38bdf8}
  .m-protein{color:#f472b6}
  .m-fat{color:#facc15}
  .m-val{font-size:16px;font-weight:800;color:#fff}
  .m-g{font-size:10px;color:#888;font-weight:normal}

  .progress-container{margin-top:12px;background:#12122e;border-radius:8px;height:8px;position:relative;overflow:hidden}
  .progress-bar{height:100%;background:linear-gradient(90deg,#38bdf8,#f472b6,#facc15);width:100%}

  .footer{background:#1a1a3e;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #2a2a5a;font-size:11px;color:#6666aa}
  .footer a{color:#8888bb;text-decoration:none;font-weight:600;transition:color .2s}
  .footer a:hover{color:#b0b0e0}
</style>
<!-- 구글 애드센스 코드 -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3501868770820650" crossorigin="anonymous"></script>
</head>
<body>
<div class="app">
  <div class="header">
    <a href="https://teemozipsa.github.io/" class="back-btn">← 도구 모음</a>
    <h1>🔥 칼로리 계산기</h1>
  </div>
  <div class="body">
    <!-- 입력 -->
    <div class="section">
      <div class="section-title">👤 내 정보 입력</div>
      <div class="field-row">
        <div class="field" style="flex:1.2">
          <label>성별</label>
          <div class="gender-toggle">
            <button class="gender-btn active" id="btn-m" onclick="setGender('m')">남성</button>
            <button class="gender-btn" id="btn-f" onclick="setGender('f')">여성</button>
          </div>
        </div>
        <div class="field">
          <label>나이 (만)</label>
          <input type="number" id="age" value="25" min="1" max="120" oninput="calc()">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>키 (cm)</label>
          <input type="number" id="height" value="170" min="100" max="250" oninput="calc()">
        </div>
        <div class="field">
          <label>몸무게 (kg)</label>
          <input type="number" id="weight" value="65" min="30" max="200" oninput="calc()">
        </div>
      </div>
    </div>

    <!-- 활동량 및 목표 -->
    <div class="section">
      <div class="section-title">🏃 활동량 및 목표</div>
      <div class="field-row">
        <div class="field">
          <label>평소 활동량</label>
          <select id="activity" onchange="calc()">
            <option value="1.2">거의 운동하지 않음 (앉아서 생활)</option>
            <option value="1.375">가벼운 활동 (주 1~3일 가벼운 운동)</option>
            <option value="1.55" selected>보통 활동 (주 3~5일 운동)</option>
            <option value="1.725">매우 활동적 (주 6~7일 강도 높은 운동)</option>
            <option value="1.9">극도로 활동적 (육체노동, 매일 2회 운동)</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>나의 목표</label>
          <select id="goal" onchange="calc()">
            <option value="lose">다이어트 (체중 감량, -500kcal)</option>
            <option value="maintain" selected>현재 체중 유지</option>
            <option value="gain">벌크업 (체중 증량, +500kcal)</option>
          </select>
        </div>
      </div>
    </div>

    <!-- 결과 -->
    <div class="result-box">
      <div class="result-title" id="res-title">하루 목표 칼로리 (유지)</div>
      <div class="result-value" id="res-cal">0 <span>kcal</span></div>
      <div class="result-desc">기초대사량(BMR): <span id="res-bmr">0</span> kcal</div>

      <div class="progress-container">
        <div class="progress-bar"></div>
      </div>

      <div class="macros-grid">
        <div class="macro-card">
          <div class="m-label m-carbs">탄수화물 (50%)</div>
          <div class="m-val" id="m-c">0<span class="m-g">g</span></div>
        </div>
        <div class="macro-card">
          <div class="m-label m-protein">단백질 (30%)</div>
          <div class="m-val" id="m-p">0<span class="m-g">g</span></div>
        </div>
        <div class="macro-card">
          <div class="m-label m-fat">지방 (20%)</div>
          <div class="m-val" id="m-f">0<span class="m-g">g</span></div>
        </div>
      </div>
      <div class="result-desc" style="margin-top:8px" id="macro-desc">다이어트를 위한 균형 잡힌 비율입니다.</div>
    </div>
  </div>
  <div class="footer">
    <span>Mifflin-St Jeor 공식 적용</span>
    <a href="https://teemozipsa.github.io/">😺 더 많은 도구</a>
  </div>
</div>

<script>
let gender = 'm';

function setGender(g) {
  gender = g;
  document.getElementById('btn-m').className = 'gender-btn' + (g === 'm' ? ' active' : '');
  document.getElementById('btn-f').className = 'gender-btn' + (g === 'f' ? ' active' : '');
  calc();
}

function calc() {
  let age = parseFloat(document.getElementById('age').value) || 0;
  let height = parseFloat(document.getElementById('height').value) || 0;
  let weight = parseFloat(document.getElementById('weight').value) || 0;
  let act = parseFloat(document.getElementById('activity').value) || 1.2;
  let goal = document.getElementById('goal').value;

  if(!age || !height || !weight) return;

  // BMR (Mifflin-St Jeor)
  let bmr = (10 * weight) + (6.25 * height) - (5 * age) + (gender === 'm' ? 5 : -161);
  let tdee = bmr * act;

  let targetCal = tdee;
  let titleStr = "하루 목표 칼로리 (유지)";
  
  // Macros ratios
  let pC = 0.5, pP = 0.3, pF = 0.2; // default maintain
  let mDesc = "일반적인 체중 유지를 위한 균형 잡힌 비율입니다. (탄5:단3:지2)";

  if(goal === 'lose') {
    targetCal = tdee - 500;
    titleStr = "하루 목표 칼로리 (다이어트)";
    pC = 0.4; pP = 0.4; pF = 0.2;
    mDesc = "다이어트를 위한 고단백 비율입니다. (탄4:단4:지2)";
  } else if(goal === 'gain') {
    targetCal = tdee + 500;
    titleStr = "하루 목표 칼로리 (벌크업)";
    pC = 0.5; pP = 0.3; pF = 0.2;
    mDesc = "벌크업을 위한 충분한 탄수화물 비율입니다. (탄5:단3:지2)";
  }

  // Minimum safe calories
  if(gender === 'm' && targetCal < 1500) targetCal = 1500;
  if(gender === 'f' && targetCal < 1200) targetCal = 1200;

  document.getElementById('res-bmr').innerText = Math.round(bmr).toLocaleString();
  document.getElementById('res-cal').innerHTML = Math.round(targetCal).toLocaleString() + " <span>kcal</span>";
  document.getElementById('res-title').innerText = titleStr;

  // Macros Calculation (Carbs 4kcal/g, Protein 4kcal/g, Fat 9kcal/g)
  let carbs = (targetCal * pC) / 4;
  let protein = (targetCal * pP) / 4;
  let fat = (targetCal * pF) / 9;

  document.getElementById('m-c').innerHTML = Math.round(carbs) + "<span class='m-g'>g</span>";
  document.getElementById('m-p').innerHTML = Math.round(protein) + "<span class='m-g'>g</span>";
  document.getElementById('m-f').innerHTML = Math.round(fat) + "<span class='m-g'>g</span>";

  // Update UI Labels
  document.querySelector('.m-carbs').innerText = `탄수화물 (${Math.round(pC*100)}%)`;
  document.querySelector('.m-protein').innerText = `단백질 (${Math.round(pP*100)}%)`;
  document.querySelector('.m-fat').innerText = `지방 (${Math.round(pF*100)}%)`;
  document.getElementById('macro-desc').innerText = mDesc;
}

// init
calc();
</script>
</body>
</html>
