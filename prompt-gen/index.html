<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/special-chars/favicon.png">
<title>🤖 AI 프롬프트 자판기 — 티모집사</title>
<meta name="description" content="빈칸만 채우면 AI가 잘 알아듣는 구조화된 프롬프트가 완성! ChatGPT, Claude 등에 바로 붙여넣기.">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3501868770820650" crossorigin="anonymous"></script>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard',sans-serif;background:#0f0f23;color:#e0e0f0;min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:flex-start}
  .app{background:#16213e;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.5);width:520px;max-width:100%;overflow:hidden}
  .header{background:linear-gradient(135deg,#0f3460,#533483);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
  .back-btn{background:rgba(255,255,255,.12);border:none;color:#ddd;font-size:12px;cursor:pointer;padding:5px 10px;border-radius:6px;text-decoration:none;transition:background .2s;font-family:inherit;display:flex;align-items:center;gap:4px}
  .back-btn:hover{background:rgba(255,255,255,.22);color:#fff}
  .header h1{font-size:15px;font-weight:600;color:#fff}
  .body{padding:16px;display:flex;flex-direction:column;gap:12px}

  .section{background:#1a1a3e;border-radius:12px;padding:14px 16px;border:1px solid #2a2a5a}
  .section-title{font-size:12px;font-weight:700;color:#8888bb;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
  .field:last-child{margin-bottom:0}
  .field label{font-size:11px;color:#6666aa;font-weight:600;display:flex;align-items:center;gap:4px}
  .field label .tip{font-weight:400;color:#444466}
  .field input,.field textarea,.field select{background:#12122e;border:1px solid #2a2a5a;border-radius:8px;color:#e0e0ff;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;width:100%}
  .field input:focus,.field textarea:focus{border-color:#533483}
  .field input::placeholder,.field textarea::placeholder{color:#333355}
  .field textarea{resize:vertical;min-height:60px;line-height:1.5}

  /* 프리셋 */
  .presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .preset{background:#222250;border:1px solid #2a2a5a;color:#8888bb;padding:5px 12px;border-radius:8px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
  .preset:hover{border-color:#533483;color:#c4b5fd}
  .preset.active{background:#533483;color:#fff;border-color:#533483}

  /* 결과 */
  .result-box{display:none;background:#12122e;border:1px solid #2a2a5a;border-radius:10px;padding:14px;font-size:13px;line-height:1.7;color:#e0e0ff;white-space:pre-wrap;word-break:break-word;max-height:300px;overflow-y:auto;position:relative}
  .btn-row{display:flex;gap:8px}
  .btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s}
  .btn-primary{background:linear-gradient(135deg,#533483,#6b44a3);color:#fff}
  .btn-secondary{background:#1a1a3e;border:1px solid #2a2a5a;color:#8888bb}
  .btn:hover{opacity:.85}

  .char-count{font-size:10px;color:#444466;text-align:right;margin-top:4px}

  .footer{background:#1a1a3e;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #2a2a5a;font-size:11px;color:#6666aa}
  .footer a{color:#8888bb;text-decoration:none;font-weight:600;transition:color .2s}
  .footer a:hover{color:#b0b0e0}
  .guide-section{margin:12px;border:1px solid #333366;border-radius:8px;overflow:hidden}
  .guide-section summary{padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;color:#b0b0e0;list-style:none;display:flex;align-items:center;gap:6px;background:#1e1e44;transition:background .2s}
  .guide-section summary:hover{background:#2a2a5a}
  .guide-section[open] summary{background:#2a2a5a;border-bottom:1px solid #333366}
  .guide-content{padding:12px 14px;font-size:12px;color:#8888bb;line-height:1.8}
  .guide-content ol{padding-left:20px}.guide-content li{margin-bottom:4px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <a href="https://teemozipsa.github.io/" class="back-btn">← 도구 모음</a>
    <h1>🤖 AI 프롬프트 자판기</h1>
  </div>
  <div class="body">
    <div class="section">
      <div class="section-title">⚡ 빠른 템플릿</div>
      <div class="presets">
        <button class="preset" onclick="loadPreset('general')">💬 범용</button>
        <button class="preset" onclick="loadPreset('writing')">✍️ 글쓰기</button>
        <button class="preset" onclick="loadPreset('code')">💻 코딩</button>
        <button class="preset" onclick="loadPreset('translate')">🌐 번역</button>
        <button class="preset" onclick="loadPreset('summary')">📋 요약</button>
        <button class="preset" onclick="loadPreset('brainstorm')">💡 브레인스토밍</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">📝 프롬프트 빌더</div>

      <div class="field">
        <label>🎭 역할 (Role) <span class="tip">— AI에게 부여할 전문가 역할</span></label>
        <input type="text" id="role" placeholder="예: 10년차 마케팅 전문가" oninput="build()">
      </div>

      <div class="field">
        <label>🎯 목적 (Task) <span class="tip">— 무엇을 해달라고 할 건지</span></label>
        <textarea id="task" placeholder="예: 인스타그램 릴스용 마케팅 카피 10개를 작성해줘" oninput="build()"></textarea>
      </div>

      <div class="field">
        <label>📌 맥락 (Context) <span class="tip">— 배경 정보, 대상, 상황 (선택)</span></label>
        <textarea id="context" placeholder="예: 타겟은 20-30대 여성, 제품은 비건 화장품 브랜드" oninput="build()"></textarea>
      </div>

      <div class="field">
        <label>📐 출력 형식 (Format) <span class="tip">— 원하는 결과물 형태 (선택)</span></label>
        <input type="text" id="format" placeholder="예: 번호 매긴 리스트, 각 항목 2줄 이내" oninput="build()">
      </div>

      <div class="field">
        <label>⚠️ 제약 조건 (Constraints) <span class="tip">— 주의사항, 금지 사항 (선택)</span></label>
        <input type="text" id="constraints" placeholder="예: 이모지 포함, 각 카피 30자 이내, 영어 사용 금지" oninput="build()">
      </div>

      <div class="field">
        <label>🗣️ 어조 (Tone) <span class="tip">— 말투 스타일 (선택)</span></label>
        <select id="tone" onchange="build()">
          <option value="">지정 안 함</option>
          <option value="친근하고 캐주얼한">친근하고 캐주얼하게</option>
          <option value="전문적이고 격식 있는">전문적이고 격식 있게</option>
          <option value="유머러스하고 재치 있는">유머러스하고 재치 있게</option>
          <option value="간결하고 핵심만 담은">간결하고 핵심만</option>
          <option value="공감적이고 따뜻한">공감적이고 따뜻하게</option>
          <option value="설득력 있고 논리적인">설득력 있고 논리적으로</option>
        </select>
      </div>
    </div>

    <div class="result-box" id="resultBox"></div>
    <div class="char-count" id="charCount"></div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="copyPrompt()">📋 프롬프트 복사</button>
      <button class="btn btn-secondary" onclick="clearAll()">🗑️ 초기화</button>
    </div>
  </div>
  <details class="guide-section">
    <summary>📖 사용 방법</summary>
    <div class="guide-content">
      <ol>
        <li>카테고리에서 원하는 프롬프트 템플릿을 선택하세요.</li>
        <li>빈칸([ ] 부분)에 원하는 내용을 채워넣으세요.</li>
        <li>"복사" 버튼을 클릭하여 완성된 프롬프트를 ChatGPT, Claude 등에 붙여넣으세요.</li>
      </ol>
    </div>
  </details>
  <div class="footer">
    <span>빈칸만 채우면 프롬프트 완성!</span>
    <a href="https://teemozipsa.github.io/">😺 더 많은 도구</a>
  </div>
</div>
<script>
const PRESETS = {
  general: { role:'도움이 되는 AI 어시스턴트', task:'', context:'', format:'', constraints:'', tone:'' },
  writing: { role:'10년차 카피라이터', task:'아래 주제로 블로그 글을 작성해줘', context:'', format:'제목 + 소제목 3개 + 본문 (총 800자 내외)', constraints:'쉬운 표현, 한국어만', tone:'친근하고 캐주얼한' },
  code: { role:'시니어 풀스택 개발자', task:'아래 요구사항에 맞는 코드를 작성해줘', context:'', format:'코드 블록 + 주석 + 간단한 사용법 설명', constraints:'최신 문법 사용, 에러 처리 포함', tone:'간결하고 핵심만 담은' },
  translate: { role:'한영 전문 번역가', task:'아래 텍스트를 자연스러운 영어로 번역해줘', context:'', format:'원문과 번역문을 나란히', constraints:'직역보다 의역 중심, 뉘앙스 살리기', tone:'' },
  summary: { role:'문서 요약 전문가', task:'아래 내용을 핵심만 간결하게 요약해줘', context:'', format:'3줄 요약 + 핵심 키워드 5개', constraints:'원문의 핵심 논지를 빠뜨리지 않기', tone:'간결하고 핵심만 담은' },
  brainstorm: { role:'창의적인 기획자', task:'아래 주제에 대한 아이디어를 브레인스토밍해줘', context:'', format:'번호 매긴 리스트, 각 아이디어에 한 줄 설명 포함', constraints:'실현 가능성 높은 아이디어 위주, 최소 10개', tone:'유머러스하고 재치 있는' }
};

function loadPreset(key) {
  const p = PRESETS[key];
  document.getElementById('role').value = p.role;
  document.getElementById('task').value = p.task;
  document.getElementById('context').value = p.context;
  document.getElementById('format').value = p.format;
  document.getElementById('constraints').value = p.constraints;
  document.getElementById('tone').value = p.tone;
  document.querySelectorAll('.preset').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  build();
}

function build() {
  const role = document.getElementById('role').value.trim();
  const task = document.getElementById('task').value.trim();
  const context = document.getElementById('context').value.trim();
  const format = document.getElementById('format').value.trim();
  const constraints = document.getElementById('constraints').value.trim();
  const tone = document.getElementById('tone').value;

  if (!role && !task) {
    document.getElementById('resultBox').style.display = 'none';
    document.getElementById('charCount').textContent = '';
    return;
  }

  let prompt = '';
  if (role) prompt += `당신은 ${role}입니다.\n\n`;
  if (task) prompt += `[요청]\n${task}\n\n`;
  if (context) prompt += `[맥락/배경]\n${context}\n\n`;
  if (tone) prompt += `[어조]\n${tone} 말투로 작성해주세요.\n\n`;
  if (format) prompt += `[출력 형식]\n${format}\n\n`;
  if (constraints) prompt += `[제약 조건]\n${constraints}\n`;

  prompt = prompt.trim();
  document.getElementById('resultBox').textContent = prompt;
  document.getElementById('resultBox').style.display = 'block';
  document.getElementById('charCount').textContent = `${prompt.length}자`;
}

function copyPrompt() {
  const text = document.getElementById('resultBox').textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = '✅ 복사 완료!';
    setTimeout(() => { btn.textContent = '📋 프롬프트 복사'; }, 1500);
  });
}

function clearAll() {
  ['role','task','context','format','constraints'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('tone').value = '';
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('charCount').textContent = '';
  document.querySelectorAll('.preset').forEach(b => b.classList.remove('active'));
}
</script>
</body>
</html>
